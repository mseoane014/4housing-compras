      +'<div style="font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase">'+titulo+'</div>'
      +'<div style="font-size:28px;font-weight:700;color:var(--olive-ink);margin:2px 0 12px">'+(total>0?simb+fmt2(total):simb+'0,00')+'</div>'
      +'<div style="display:flex;align-items:center;gap:14px">'+donut(b.sc,b.cl,b.lp)
      +'<div style="font-size:12px;line-height:1.5;color:var(--ink);flex:1">'
      +leg(COL.sc,'Sin certificar',b.sc)+leg(COL.cl,'Cert. pend. liberar',b.cl)+leg(COL.lp,'Liberado por pagar',b.lp)
      +'</div></div></div>';
  }
  const resumen='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'

      +'<td>'+esc(o.clasif_og||'')+'</td>'

      +'<td style="text-align:right">'+(d.cl?mfmt(mon,d.cl):'—')+'</td>'
      +'<td style="text-align:right">'+(d.lp?mfmt(mon,d.lp):'—')+'</td>'
      +'<td style="text-align:right"><strong>'+mfmt(mon,d.sc+d.cl+d.lp)+'</strong></td></tr>';
  }).join('');
  const detalle='<div class="card" style="margin-top:14px"><div class="card-h"><h3>Detalle por OG</h3><span class="meta">Montos en la moneda de cada OG.</span></div>'
    +'<table class="grid" style="font-size:12.5px"><thead><tr><th>OG</th><th>Clasif.</th><th>Moneda</th><th style="text-align:right">Sin certificar</th><th style="text-align:right">Cert. pend. liberar</th><th style="text-align:right">Liberado por pagar</th><th style="text-align:right">Total pend.</th></tr></thead><tbody>'+drows+'</tbody></table></div>';
  return resumen+detalle;

/* ==================== ASIENTO · FORMATO IMPORTACIÓN TANGO ====================
   Genera el .xlsx con las 3 hojas que Tango espera al importar asientos
   (Asientos contables / Renglones / Cotizaciones), linkeadas por "Identificador"
   (= N° de OG), MÁS una hoja "Auxiliares" al costado (agregado nuestro, porque
   el template de Tango no la trae). Todo por CÓDIGO.
   Supuestos marcados con  // SUPUESTO  → revisar con Axoft cómo ingesta los aux. */
const ASIENTO_TIPO_CN='CN';          // SUPUESTO: tipo de asiento CN - Asientos de Contabilidad
const ASIENTO_CLASE='Básico';
const ASIENTO_ESTADO_DEF='Borrador'; // se importan en Borrador para revisar en Tango
function auxDescLookup(tipoCod, cod){
  try{ if(typeof CONTA_DB!=='undefined' && CONTA_DB.auxopc && CONTA_DB.auxopc[tipoCod]){
    const f=CONTA_DB.auxopc[tipoCod].find(x=>x.cod===cod); if(f) return f.desc; } }catch(e){}
  return '';
}
function asientoTangoSheets(ogs){
  const cabH=['Identificador','Fecha de asiento','Clase de asiento','Código de tipo de asiento','Estado','Código de moneda','Concepto','Observaciones','SOLP','OG','BONOS','Eliminar','ROW_VERSION'];
  const renH=['Identificador','Nro.','Código de cuenta','Debe','Haber','Fecha de origen','Leyenda','Importe de la unidad adicional','Cantidad','Eliminar','ROW_VERSION'];
  const cotH=['Identificador','Código de moneda','Código de tipo de cotización','Cotización','Eliminar','ROW_VERSION'];
  const auxH=['Identificador','Nro. renglón','Código tipo auxiliar','Tipo auxiliar','Código auxiliar','Descripción auxiliar','Porcentaje','Importe','Leyenda'];
  const cab=[cabH], ren=[renH], cot=[cotH], aux=[auxH];
  ogs.forEach(o=>{
    const id=o.numero||o.id;                              // Identificador = N° OG
    const monCode=ogMonedaCode(o)==='USD'?'DOL':'PES';
    let fecha=o.fecha||''; try{ if(/^\d{4}-\d{2}-\d{2}/.test(o.fecha)) fecha=new Date(o.fecha+'T00:00:00'); }catch(e){}
    const concepto='OG '+(o.numero||'')+' - '+(o.proveedor||o.objeto||'');
    cab.push([id, fecha, ASIENTO_CLASE, ASIENTO_TIPO_CN, ASIENTO_ESTADO_DEF, monCode, concepto, '', (o.solp!=null?o.solp:''), (o.numero||''), '', 'No', '']);
    // renglones de gasto (uno por renglón de la OG) → al DEBE
    let nro=0;
    (o.items||[]).forEach(it=>{
      const im=imputacion(it); const imp=itemTotal(it);
      nro++;
      const leyenda=(o.proveedor_cod||'')+' - '+(im.cuenta||it.articulo||o.objeto||'');
      ren.push([id, nro, im.cuenta_cod||'', imp, '', fecha, leyenda, '', '', 'No', '']);
      // auxiliares de ese renglón
      if(im.eerr){ const c=EERR_COD[im.eerr]||''; aux.push([id,nro,'02','EERR',c,im.eerr,100,imp,leyenda]); }               // Aux 02 EERR (obligatorio)
      if(im.aux03){ aux.push([id,nro,'03','INSTRUCTIVO DE FABRICACION',im.aux03,auxDescLookup('3',im.aux03),100,imp,leyenda]); } // Aux 03 proyecto
      if(im.aux04){ const mods=String(im.aux04).split(' | ').map(s=>s.trim()).filter(Boolean); const n=mods.length;
        if(n){ const base=Math.floor(imp/n*100)/100, pbase=Math.floor(100/n*100)/100;   // prorateo D3: partes iguales, resto al ultimo modulo
          mods.forEach((m,i)=>{ const last=(i===n-1);
            const impi=last?+(imp-base*(n-1)).toFixed(2):base, pi=last?+(100-pbase*(n-1)).toFixed(2):pbase;
            aux.push([id,nro,'04','CONTENEDOR/MODULO',m,auxDescLookup('4',m),pi,impi,leyenda]); }); } }
      if(im.aux05){ aux.push([id,nro,'05','MANTENIMIENTO BS DE USO',im.aux05,auxDescLookup('5',im.aux05),100,imp,leyenda]); } // Aux 05 bien de uso
      if(im.aux06){ aux.push([id,nro,'06','MUEBLES Y UTILES',im.aux06,auxDescLookup('6',im.aux06),100,imp,leyenda]); }        // Aux 06 muebles
      if(im.aux07){ aux.push([id,nro,'07','HERRAMIENTAS',im.aux07,auxDescLookup('7',im.aux07),100,imp,leyenda]); }            // Aux 07 herramienta
      if(im.aux08){ aux.push([id,nro,'08','RODADOS',im.aux08,auxDescLookup('8',im.aux08),100,imp,leyenda]); }               // Aux 08 rodado
    });
    // contrapartida de caja (total OG) → al HABER
    const tot=ogTotal(o);
    const pg=pagosOf(o.id)[0];
    const caja = pg&&CAJAS[pg.moneda_pago] ? CAJAS[pg.moneda_pago] : (monCode==='DOL'?CAJAS.USD:CAJAS.ARS);
    nro++;
    ren.push([id, nro, caja.cod, '', tot, fecha, caja.nombre+' - OG '+(o.numero||''), '', '', 'No', '']);
    // cotización (solo si el asiento es en dólares) → SUPUESTO: usa el TC de la OG
    if(monCode==='DOL'){ const tc=o.tc_pesos||o.tc||''; cot.push([id,'DOL','COTIZACIÓN',tc,'No','']); }
  });
  return {cab,ren,cot,aux};
}
function exportAsientoTango(ogId){
  if(typeof XLSX==='undefined'){ toast('Necesitás conexión para exportar.'); return; }
  const ogs = ogId!=null ? [ogById(ogId)] : (mem.ogs||[]).filter(ogxPass);
  if(!ogs.length){ toast('No hay OG para exportar.'); return; }
  const s=asientoTangoSheets(ogs);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s.cab), 'Asientos contables');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s.ren), 'Renglones');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s.cot), 'Cotizaciones');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s.aux), 'Auxiliares');
  const suf = ogId!=null ? ('OG_'+(ogs[0].numero||'')) : new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'Asiento_Tango_'+suf+'.xlsx');
  toast('Asiento (formato Tango) generado');
}
window.asientoTangoSheets=asientoTangoSheets; window.exportAsientoTango=exportAsientoTango;

function pgCalc(){
  const o=window._pgOG; if(!o) return; const monOG=ogMonedaCode(o);

    if(monOG==='USD'&&monPago==='ARS'){ importe=montoOG*tc; nota='US$ '+montoOG.toLocaleString('es-AR',{maximumFractionDigits:2})+' × '+tc+' = '; }
    else if(monOG==='ARS'&&monPago==='USD'){ importe= tc? montoOG/tc : 0; nota='$ '+montoOG.toLocaleString('es-AR')+' ÷ '+tc+' = '; }

  window._pgImporte=importe;
}

async function savePago(ogId){
  if(!canPago()){ toast('Solo el tesorero puede registrar pagos.'); return; }
  const o=ogById(ogId); const monOG=ogMonedaCode(o);
  let pct=+document.getElementById('pg_pct').value||0;
  const pend=ogPendPagoPct(o);
  if(pct<=0){ toast('Ingresá un % mayor a 0'); return; }
  if(pct>pend+0.5){ toast('El % supera lo pendiente (exacto: '+pend.toFixed(4)+'%)'); return; }
  if(pct>pend) pct=pend;   // cargó el pendiente redondeado; ajusto al exacto para no pasarme
  const monPago=document.getElementById('pg_moneda').value;
  const tc=+document.getElementById('pg_tc').value||0;
  if((monOG==='USD'||monPago==='USD') && !tc){ toast('Cargá el tipo de cambio'); return; }
  // importe consistente con el % ya ajustado
  const montoOG=ogTotal(o)*pct/100;
  let importe=montoOG;

async function saveOG(id){

    .map(it=>({cod_art:it.cod_art||'',articulo:it.articulo||'',hito:it.hito||'',cert_modo:(it.cert_modo==='unid'?'unid':'pct'),centro_costos:it.centro_costos||'',modulos:(it.modulos||[]).slice(0,5),cant:+it.cant||0,um:it.um||'UNI',precio_unit:+it.precio_unit||0,imp:it.imp||{}}));

    desvio:gv('og_desvio'), desvio_txt:gv('og_desvio_txt'), alcance:gv('og_alcance'), observaciones:gv('og_obs'),
    items };
  obj.monto_total = items.length ? items.reduce((a,it)=>a+(it.cant*it.precio_unit),0) : (gv('og_monto')===''?null:+gv('og_monto'));

      await reloadDB();
    }
  }catch(e){
    toast('No se pudo guardar la OG: '+(e && e.message ? e.message : e));

async function saveCert(ogId, id){
  if(!canCert()){ toast('No tenés permiso para cargar/editar certificados.'); return; }
  const editando=(id!=null&&id!=='null');
  if(editando && pagosOf(ogId).length>0){ toast('La OG tiene pagos: no se puede editar el certificado. El tesorero debe eliminar el pago primero.'); return; }
  const o=ogById(ogId); const hasItems = o && o.items && o.items.length;
  const obj={ og_id:ogId, numero:document.getElementById('ct_num').value, fecha:document.getElementById('ct_fecha').value,
    observaciones:document.getElementById('ct_obs').value };
  if(id==null||id==='null') obj.numero = nextCertNum(o);   // recalcula al guardar (evita colisiones)
  if(hasItems){ const av={}; o.items.forEach((it,idx)=>{ const el=document.getElementById('ctav_'+idx); if(el && el.value!==''){ let v=+el.value; if(it.cert_modo==='unid'){ const c=+it.cant||0; v = c ? (v/c*100) : 0; } av[idx]=v; } }); obj.avances=av; obj.pct=null; }
  else { const pct=document.getElementById('ct_pct').value; obj.pct=(pct===''?0:+pct); }
  // Validación: el acumulado no puede superar el 100%
  const stored = (id!=null&&id!=='null') ? certsOf(ogId).find(x=>String(x.id)===String(id)) : null;
  const EPS=0.01;
  if(hasItems){
    for(let idx=0; idx<o.items.length; idx++){
      const nv=+((obj.avances||{})[idx])||0;
      const prev=+(((stored||{}).avances||{})[idx])||0;
      const nuevo=itemAcumPct(o,idx)-prev+nv;
      if(nuevo>100+EPS){ toast('El ítem “'+(o.items[idx].descripcion||('#'+(idx+1)))+'” superaría el 100% (quedaría '+nuevo.toFixed(1).replace('.0','')+'%)'); return; }
    }
  }else{
    const prev=+(stored||{}).pct||0;
    const nuevo=ogAcumPct(ogId)-prev+(+obj.pct||0);
    if(nuevo>100+EPS){ toast('Supera el 100% de la OG (quedaría '+nuevo.toFixed(1).replace('.0','')+'%). No se puede certificar más que el total.'); return; }
  }
  if(DEMO_MODE){ if(id==null||id==='null'){ obj.id=Math.max(0,...mem.certificados.map(r=>+r.id||0))+1; mem.certificados.push(obj); } else { const r=mem.certificados.find(x=>String(x.id)===String(id)); if(r) Object.assign(r,obj); } }
  else { if(id==null||id==='null') await sbFetch('/og_certificados',{method:'POST',body:JSON.stringify(obj)}); else await sbFetch('/og_certificados?id=eq.'+id,{method:'PATCH',body:JSON.stringify(obj)}); await reloadDB(); }
  OG_EXPANDED.add(ogId);
  closeModal(); toast('Certificado guardado'); renderCompras();
}

function delCert(id, ogId){

}

async function confirmDelCert(id, ogId){
  if(pagosOf(ogId).length>0){ toast('La OG tiene pagos; no se puede eliminar el certificado.'); return; }

  else { await sbFetch('/og_certificados?id=eq.'+id,{method:'DELETE',prefer:'return=minimal'}); await reloadDB(); }

  closeModal(); toast('Eliminado'); renderCompras();
}

async function guardarNuevoProv(){
  const g=id=>(document.getElementById(id).value||'').trim();
  const cod=g('np_cod'), razon=g('np_razon');
  if(!cod||!razon){ toast('Código y razón social son obligatorios.'); return; }
  if(DIC.proveedores.some(p=>p.codigo.toLowerCase()===cod.toLowerCase())){ toast('Ya existe un proveedor con ese código.'); return; }
  const obj={ codigo:cod, razon:razon, comercial:g('np_com')||razon, cuit:g('np_cuit'), tel:g('np_tel'), movil:'', email:g('np_email'), web:'' };
  if(!DEMO_MODE){
    try{ await sbFetch('/proveedores',{method:'POST',body:JSON.stringify(obj)}); }
    catch(e){ toast('No se pudo guardar: '+(e.message||e)); return; }
  }
  DIC.proveedores.push(obj);
  DIC.proveedores.sort((a,b)=>a.codigo.localeCompare(b.codigo));
  closeModal(); toast('Proveedor agregado'); renderDic();
}
window.guardarNuevoProv=guardarNuevoProv;

async function doLogin(){
  const { error } = await sbClient.auth.signInWithOAuth({
    provider:'azure',
    options:{ scopes:'openid profile email', redirectTo:REDIRECT_URL }
  });
  if(error){
    authScreen('No se pudo iniciar sesión.<br><span style="font-size:12px;color:#94917f">'+esc(error.message)+'</span>','Reintentar');
    setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=doLogin; },50);
  }
}

async function initAuth(){
  if(DEMO_MODE) return true; // sin login en demo
  if(!window.supabase){
    authScreen('No se pudo cargar el sistema de inicio de sesión. Verificá tu conexión a internet.','Reintentar');
    setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=()=>location.reload(); },50);
    return false;
  }
  sbClient = window.supabase.createClient(SB_URL, SB_KEY);
  const { data:{ session } } = await sbClient.auth.getSession();
  if(session && session.user){ AUTH_USER=session.user; return true; }
  authScreen('Ingresá con tu cuenta de Microsoft de la organización para acceder.','Iniciar sesión con Microsoft');
  setTimeout(()=>{ const b=document.getElementById('authBtn'); if(b) b.onclick=doLogin; },50);
  return false;
}

/* Carga de datos desde Supabase en producción (mismo criterio que la comercial:
   una caché en memoria — mem.* — que en demo trae los seeds y en real trae la nube). */
async function reloadDB(){
  if(DEMO_MODE) return;
  try{
    mem.ogs          = await sbFetch('/ogs?select=*&order=id.desc') || [];
    mem.certificados = await sbFetch('/og_certificados?select=*&order=id.asc') || [];
    mem.pagos        = await sbFetch('/pagos?select=*&order=id.asc') || [];
    const cajas      = await sbFetch('/caja?select=*') || [];
    mem.caja = mem.caja || {};
    cajas.forEach(c=>{ if(c.moneda==='ARS') mem.caja.ARS_ini=+c.saldo_inicial||0; if(c.moneda==='USD') mem.caja.USD_ini=+c.saldo_inicial||0; });
    // Proveedores: si hay lista en Supabase, reemplaza el ejemplo embebido
    try{
      const provs = await sbFetchAll('/proveedores?select=codigo,razon,comercial,cuit,tel,movil,email,web&order=codigo.asc');
      if(provs && provs.length) DIC.proveedores = provs.map(p=>({codigo:p.codigo, razon:p.razon||'', comercial:p.comercial||p.razon||'', cuit:p.cuit||'', tel:p.tel||'', movil:p.movil||'', email:p.email||'', web:p.web||''}));
    }catch(e){ /* si la tabla está vacía o falla, queda el ejemplo embebido */ }
    // Artículos: idem
    try{
      const arts = await sbFetchAll('/articulos?select=codigo,descripcion,desc_adicional,sinonimo,cuenta_cod,cuenta&order=codigo.asc');
      if(arts && arts.length) DIC.articulos = arts.map(a=>({codigo:a.codigo, descripcion:a.descripcion||'', desc_adicional:a.desc_adicional||'', sinonimo:a.sinonimo||'', cuenta_cod:a.cuenta_cod||'', cuenta:a.cuenta||''}));
    }catch(e){ /* queda el ejemplo embebido */ }
    // Contabilidad (cuentas + auxiliares): RLS en Supabase oculta lo confidencial a quien no tiene permiso
    try{
      const cu=await sbFetchAll('/cuentas_contables?select=cod,descripcion,clase,tipo,saldo,usa_aux,habil,confidencial&order=cod.asc');
      if(cu&&cu.length) CONTA_DB.cuentas=cu.map(r=>({cod:r.cod,desc:r.descripcion||'',clase:r.clase||'',tipo:r.tipo||'',saldo:r.saldo||'',usa_aux:r.usa_aux||'',habil:r.habil||'',confidencial:!!r.confidencial}));
    }catch(e){}
    try{
      const tp=await sbFetch('/aux_tipos?select=cod,descripcion,confidencial&order=cod.asc');
      if(tp&&tp.length) CONTA_DB.tipos=tp.map(t=>({cod:t.cod,desc:t.descripcion||'',confidencial:!!t.confidencial}));
      const op=await sbFetchAll('/aux_opciones?select=tipo_cod,cod,descripcion,habil,confidencial&order=tipo_cod.asc');
      if(op&&op.length){ const m={}; op.forEach(o=>{ (m[o.tipo_cod]=m[o.tipo_cod]||[]).push({cod:o.cod,desc:o.descripcion||'',habil:o.habil||'',confidencial:!!o.confidencial}); }); CONTA_DB.auxopc=m; }
    }catch(e){}
    // Usuarios (para desplegables Comprador / Certifica la OG) — desde la vista pública (solo nombre + flags)
    try{
      const us=await sbFetch('/usuarios_publicos?select=nombre,es_comprador,es_certificador&order=nombre.asc');
      if(us) USUARIOS=us;
    }catch(e){ /* si la vista no existe o no se puede leer, queda vacío */ }
  }catch(e){ toast('No se pudieron cargar los datos desde la nube.'); }
}
window.reloadDB=reloadDB;
