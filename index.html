<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4housing Operaciones — Compras & Ops</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --olive:#9db98b; --olive-deep:#5f7a4e; --olive-soft:#b8cdac; --olive-ink:#37432c;
  --cream:#f4f2ea; --paper:#ffffff; --ink:#2b2b26; --muted:#94917f;
  --line:#e2dfd4; --line-strong:#d3d0c4; --chip:#eceadf; --bg:#eceae1;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Archivo',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:var(--olive-deep);}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh;}
.side{width:230px;flex:none;background:#2f3a26;color:#e7ecdf;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;}
.side .brand{color:#fff;font-family:'Quicksand',sans-serif;font-weight:700;font-size:19px;letter-spacing:.02em;line-height:26px;padding:0 6px 4px;}
.side .brand-sub{color:#9fb08c;font-size:11px;font-weight:600;padding:0 6px 14px;letter-spacing:.02em;}
.nav-group-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7e8a6c;font-weight:700;padding:14px 13px 5px;}
.navbtn{display:flex;align-items:center;gap:11px;background:none;border:none;color:#cdd6bf;padding:11px 13px;border-radius:9px;font-size:14px;font-weight:600;text-align:left;letter-spacing:.01em;transition:.15s;width:100%;}
.navbtn svg{width:19px;height:19px;flex:none;}
.navbtn:hover{background:rgba(255,255,255,.07);color:#fff;}
.navbtn.active{background:var(--olive);color:var(--olive-ink);}
.side .sp{flex:1;}
.side .data-actions .lbl{font-size:10px;letter-spacing:.16em;color:#9fb08c;font-weight:700;margin-bottom:2px;padding:0 4px;}
.minib{background:rgba(255,255,255,.08);border:none;color:#dfe7d3;padding:9px 11px;border-radius:8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;width:100%;margin-top:6px;}
.minib svg{width:15px;height:15px;}
.minib:hover{background:rgba(255,255,255,.16);}
.autosave{font-size:10px;color:#8fa07c;text-align:center;margin-top:8px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:18px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;gap:14px;}
.topbar h1{margin:0;font-size:21px;font-weight:700;}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:2px;}
#topActions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.content{padding:26px 30px 60px;flex:1;}

/* banner demo */
.demo-banner{background:#fbf1e0;border:1px solid #ecd9b0;color:#8a6a2e;font-size:12.5px;font-weight:600;padding:9px 30px;display:flex;align-items:center;gap:9px;}
.demo-banner svg{width:16px;height:16px;flex:none;}

/* ===== BOTONES ===== */
.btn{background:var(--olive-deep);color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:13.5px;font-weight:600;letter-spacing:.02em;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1.1;min-height:42px;}
.btn svg{width:17px;height:17px;}
.btn:hover{background:#536a44;}
.btn.ghost{background:#fff;color:var(--olive-deep);border:1px solid var(--line-strong);}
.btn.ghost:hover{background:var(--cream);}
.btn.danger{background:#fff;color:#b4554e;border:1px solid #e8cfcc;}
.btn.danger:hover{background:#fbf0ef;}
.btn.sm{padding:7px 12px;min-height:34px;font-size:12.5px;border-radius:8px;}

/* ===== KPIs ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;}
.kpi-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;}
.kpi-value{font-size:30px;font-weight:700;line-height:1;margin:8px 0 6px;}
.kpi-sub{font-size:11.5px;color:var(--muted);line-height:1.35;}
.kpi .ok{color:#4f8a53;} .kpi .bad{color:#b0584f;}

/* ===== CARD + TABLA ===== */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.card-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-h h3{margin:0;font-size:15px;font-weight:700;}
.card-h .meta{font-size:12px;color:var(--muted);font-weight:600;}
table.grid{width:100%;border-collapse:collapse;}
table.grid th{text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);background:#faf9f4;white-space:nowrap;}
table.grid td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
table.grid tbody tr:last-child td{border-bottom:none;}
table.grid tbody tr:hover{background:#fbfaf3;}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.iconbtn{background:none;border:1px solid var(--line-strong);border-radius:7px;padding:5px 7px;color:var(--muted);display:inline-flex;}
.iconbtn svg{width:15px;height:15px;}
.iconbtn:hover{color:var(--olive-deep);border-color:var(--olive);}
.iconbtn.del:hover{color:#b4554e;border-color:#e8cfcc;}
.empty{padding:46px 20px;text-align:center;color:var(--muted);font-size:14px;}

/* badges de estado (genéricos, se colorean por texto vía JS) */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;}
.b-gris{background:#eef0f2;color:#8a9098;}
.b-oliva{background:#eef0ea;color:#7d8a6e;}
.b-azul{background:#e7eef6;color:#4f7099;}
.b-ambar{background:#fbf1e0;color:#b3853a;}
.b-verde{background:#e6f1e3;color:#4f8a53;}
.b-rojo{background:#f6ebea;color:#b0584f;}

/* chip ejemplo */
.demo-tag{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.06em;color:#b3853a;background:#fbf1e0;border-radius:5px;padding:2px 6px;margin-left:8px;vertical-align:middle;}

/* tira de meses (tabla, solo lectura) */
.mstrip{display:flex;gap:3px;}
.mcell{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:#f0efe8;color:#b6b3a6;border:1px solid #e6e4da;}
.mcell.plan{background:#fbf1e0;color:#b3853a;border-color:#eddcb0;}
.mcell.hecho{background:#e6f1e3;color:#4f8a53;border-color:#cfe6cb;}
.mcell svg{width:12px;height:12px;}
.mstrip-lbl{display:flex;gap:3px;margin-bottom:3px;}
.mstrip-lbl span{width:22px;text-align:center;font-size:8px;color:#b6b3a6;font-weight:700;}

/* selector de meses (modal) */
.msel{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mbox{border:1px solid var(--line-strong);border-radius:9px;padding:8px;background:#fbfaf4;}
.mbox .mname{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-align:center;}
.mtoggle{display:flex;gap:3px;}
.mtoggle button{flex:1;border:1px solid var(--line-strong);background:#fff;border-radius:6px;padding:4px 0;font-size:10px;font-weight:700;color:var(--muted);}
.mtoggle button.on-plan{background:#f6c667;border-color:#e0ab3f;color:#5c4410;}
.mtoggle button.on-hecho{background:#8fc98a;border-color:#5f9d5a;color:#1f3d1d;}
.mbox input[type=date]{width:100%;margin-top:5px;border:1px solid var(--line-strong);border-radius:6px;padding:4px 5px;font-size:11px;background:#fff;}

/* pestañas de mantenimiento */
.mtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;}
.mtab{background:none;border:none;padding:11px 16px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;}
.mtab:hover{color:var(--olive-deep);}
.mtab.active{color:var(--olive-deep);border-bottom-color:var(--olive-deep);}

/* chips de auditorías anteriores */
.audit-list{display:flex;flex-wrap:wrap;gap:7px;}
.audit-chip{background:var(--chip);border:1px solid var(--line-strong);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:700;color:var(--olive-ink);font-family:'Archivo',monospace;letter-spacing:.03em;}
.audit-chip:hover{background:var(--olive-soft);border-color:var(--olive);}

/* checklist C/NC/NA */
table.grid.chk td,table.grid.chk th{padding:8px 12px;}
.chk-r{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.chk-r input{position:absolute;opacity:0;width:0;height:0;}
.chk-r span{display:inline-flex;align-items:center;justify-content:center;width:30px;height:26px;border:1px solid var(--line-strong);border-radius:7px;font-size:11px;font-weight:700;color:var(--muted);background:#fff;}
.chk-r input:checked + span.on-C{background:#8fc98a;border-color:#5f9d5a;color:#1f3d1d;}
.chk-r input:checked + span.on-NC{background:#e6a19a;border-color:#c06a61;color:#5a201b;}
.chk-r input:checked + span.on-NA{background:#d8d5c8;border-color:#b8b4a4;color:#4a4638;}
.chk-dot{display:inline-flex;align-items:center;justify-content:center;width:28px;height:24px;border-radius:6px;font-size:11px;font-weight:700;}
.chk-dot.on-C{background:#e6f1e3;color:#4f8a53;} .chk-dot.on-NC{background:#f6ebea;color:#b0584f;} .chk-dot.on-NA{background:#eef0f2;color:#8a9098;}

/* detalle de unidades (agrupar tipo Excel) */
.uexp{width:22px;height:22px;flex:none;border:1px solid var(--line-strong);background:#fff;border-radius:6px;font-size:15px;font-weight:700;line-height:1;color:var(--olive-deep);display:inline-flex;align-items:center;justify-content:center;}
.uexp:hover{background:var(--cream);border-color:var(--olive);}
.ucount{display:inline-block;margin-left:7px;font-size:11px;font-weight:700;color:var(--olive-deep);background:var(--chip);border-radius:20px;padding:1px 8px;vertical-align:middle;}
.detail-row > td{background:#faf9f3;padding:0;border-bottom:1px solid var(--line);}
.detail-wrap{padding:8px 18px 10px 40px;}
.detail-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;}
.detail-h span{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;}
table.grid.usub{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
table.grid.usub th{background:#f4f2ea;padding:3px 12px;font-size:10px;}
table.grid.usub td{padding:2px 12px;font-size:12px;}
table.grid.usub .iconbtn{padding:3px 5px;}
table.grid.usub .row-actions{gap:4px;}
.pbar{height:8px;background:#eceae1;border-radius:5px;overflow:hidden;}
.pbar>div{height:100%;background:var(--olive-deep);border-radius:5px;}
.og-grid tr.og-head td{background:#f3f1e8;border-top:2px solid var(--line-strong);font-size:12.5px;}
.og-grid tr.og-line td{background:#fff;}
.og-grid tr.og-line td:nth-child(2){padding-left:18px;}

/* ===== FORM ===== */
.field{margin-bottom:15px;display:flex;flex-direction:column;}
.field label{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;font-size:14px;background:#fbfaf4;color:var(--ink);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px rgba(124,138,87,.18);background:#fff;}
.field textarea{resize:vertical;min-height:70px;}
.frow{display:grid;gap:14px;}
.frow.c2{grid-template-columns:1fr 1fr;}
.frow .field{margin-bottom:0;}
.frow+.frow{margin-top:15px;}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(40,44,32,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow:auto;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:540px;box-shadow:0 24px 70px rgba(0,0,0,.3);}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.modal-h h3{margin:0;font-size:17px;font-weight:700;}
.modal-h .x{background:none;border:none;font-size:22px;color:var(--muted);line-height:1;padding:2px 6px;}
.modal-b{padding:22px;}
.modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2f3a26;color:#fff;padding:13px 22px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:900px){
  .side{width:64px;padding:16px 8px;}
  .side .brand,.side .brand-sub,.navbtn span,.nav-group-lbl,.minib span,.autosave,.side .data-actions .lbl{display:none;}
  .navbtn{justify-content:center;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:560px){ .kpi-grid{grid-template-columns:1fr;} .frow.c2{grid-template-columns:1fr;} }
/* ===== DENSIDAD COMPACTA (más líneas por pantalla) ===== */
.content{padding:18px 22px 48px;}
.topbar{padding:12px 22px;}
.topbar h1{font-size:18px;}
.topbar .sub{font-size:12px;}
.side{width:210px;padding:18px 13px;}
.side .brand{font-size:17px;line-height:22px;}
.navbtn{padding:9px 12px;font-size:13px;gap:9px;}
.navbtn svg{width:17px;height:17px;}
.mtabs{margin-bottom:16px;}
.mtab{padding:9px 13px;font-size:13px;}
.kpi-grid{gap:10px;margin-bottom:16px;}
.kpi{padding:12px 13px;border-radius:11px;}
.kpi-label{font-size:10px;}
.kpi-value{font-size:23px;margin:5px 0 4px;}
.kpi-sub{font-size:10.5px;}
.card{border-radius:11px;}
.card-h{padding:11px 15px;}
.card-h h3{font-size:13.5px;}
.card-h .meta{font-size:11px;}
table.grid th{padding:7px 12px;font-size:9.5px;}
table.grid td{padding:7px 12px;font-size:12.5px;}
table.grid.usub td,table.grid.usub th{padding:6px 11px;font-size:11.5px;}
.btn{padding:9px 14px;font-size:12.5px;min-height:36px;}
.btn svg{width:15px;height:15px;}
.btn.sm{padding:6px 10px;min-height:30px;font-size:11.5px;}
.badge{font-size:10.5px;padding:2px 8px;}
.iconbtn{padding:4px 6px;}
.iconbtn svg{width:14px;height:14px;}
.field{margin-bottom:12px;}
.field label{font-size:10.5px;margin-bottom:4px;}
.field input,.field select,.field textarea{padding:8px 10px;font-size:13px;}
.empty{padding:32px 18px;font-size:13px;}
.detail-wrap{padding:11px 16px 12px 44px;}
.modal{max-width:560px;}
.modal.wide{max-width:820px;}
.modal.xwide{max-width:1400px;width:96vw;}
.modal.xwide .field label{font-size:11px;}
.modal.xwide input,.modal.xwide select,.modal.xwide textarea{font-size:13px;padding:8px 9px;}
.modal.xwide .og-items-tbl th{font-size:10px;}
.modal.xwide .og-items-tbl input,.modal.xwide .og-items-tbl select{font-size:12px;padding:4px 6px;}
.dic-scroll{max-height:62vh;overflow:auto;border-radius:8px;}
.dic-scroll table{margin:0;}
.dic-scroll thead th{position:sticky;top:0;background:#efece1;z-index:3;box-shadow:0 1px 0 var(--line);}
.modal-b{padding:18px;}
.mcell{width:20px;height:20px;}
.mstrip-lbl span{width:20px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="brand">4housing</div>
    <div class="brand-sub">Compras &amp; Operaciones</div>
    <nav id="nav"></nav>
    <div class="sp"></div>
    <div class="data-actions">
      <div class="lbl">Datos</div>
      <button class="minib" id="btnLogout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        <span>Cerrar sesión</span>
      </button>
      <div class="autosave" id="autosaveLbl">—</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="pageTitle">Compras</h1>
        <div class="sub" id="pageSub"></div>
      </div>
      <div id="topActions"></div>
    </div>
    <div id="demoBanner"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-h"><h3 id="modalTitle">Título</h3><button class="x" onclick="closeModal()">&times;</button></div>
    <div class="modal-b" id="modalBody"></div>
    <div class="modal-f" id="modalFoot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   4housing — Compras & Operaciones (V02, esqueleto)
   Modelado sobre el index.html comercial: misma paleta, tipografías,
   sidebar, modal, capa sbFetch y login Azure.
   ================================================================ */

/* ===== CONFIG SUPABASE (PLACEHOLDERS — completar Micaela) =====
   Mientras estos valores digan TU-PROYECTO / TU-ANON-KEY, la app
   corre en MODO DEMO (datos de ejemplo en memoria, sin nube, sin login).
   Al pegar el proyecto real y la anon key, se activa nube + login Azure. */
const SB_URL = 'https://aaqpzamcdxldhqyuqlgm.supabase.co';
const SB_KEY = 'sb_publishable_WCez44YAKCcOOAJ8hCDe5Q_8IC5Ckpx';
const REDIRECT_URL = 'https://4housing-apps.github.io/4housing-compras/'; // GitHub Pages (para el login Azure)

const SB_REST = SB_URL + '/rest/v1';
const DEMO_MODE = SB_URL.includes('TU-PROYECTO') || SB_KEY.includes('TU-ANON-KEY');
let AUTH_USER = null;
let sbClient = null;

/* ================= UTILIDADES ================= */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function C(){ return document.getElementById('content'); }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function openModal(title,body,foot,size){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFoot').innerHTML=foot||'';
  const m=document.querySelector('#modalBg .modal'); if(m){ m.classList.toggle('wide', size==='wide'); m.classList.toggle('xwide', size==='xwide'); }
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').onclick=e=>{ if(e.target.id==='modalBg') closeModal(); };
window.closeModal=closeModal;

function fmtDate(v){ if(!v) return '—'; const p=String(v).slice(0,10).split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:v; }
function fmtMoney(v){ return (v==null||v==='')?'—':'$'+(+v||0).toLocaleString('es-AR'); }
/* Antigüedad a partir de un AAAAMM (ej. '201905' -> '6 años 2 m'). */
function edadAAAAMM(s){
  if(!/^\d{6}$/.test(String(s||''))) return '';
  const y=+String(s).slice(0,4), m=+String(s).slice(4,6);
  if(m<1||m>12) return '';
  const now=new Date();
  let months=(now.getFullYear()-y)*12+(now.getMonth()+1-m);
  if(months<0) return '';
  const a=Math.floor(months/12), me=months%12;
  return a ? (a+' año'+(a>1?'s':'')+(me?' '+me+' m':'')) : (me+' m');
}
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

/* Sitios estándar (única fuente; editá acá para sumar/quitar). "Otro" habilita texto libre. */
const SITIOS=['Base Buenos Aires','Base Neuquén'];
function sitioField(id, current){
  const inList=SITIOS.includes(current);
  const opts=SITIOS.map(s=>'<option'+(s===current?' selected':'')+'>'+esc(s)+'</option>').join('')
    +'<option value="__otro"'+((!inList&&current)?' selected':'')+'>Otro / nuevo…</option>';
  const showOtro=(!inList&&current);
  return '<select id="'+id+'" onchange="onSitioChange(\''+id+'\')">'+opts+'</select>'
    +'<input id="'+id+'_otro" type="text" placeholder="Nombre del nuevo sitio" value="'+esc(showOtro?current:'')+'" '
    +'style="margin-top:8px;width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:10px 12px;font-size:14px;background:#fbfaf4;'+(showOtro?'':'display:none;')+'">';
}
function onSitioChange(id){ const inp=document.getElementById(id+'_otro'); inp.style.display=document.getElementById(id).value==='__otro'?'block':'none'; }
function sitioValue(id){ const sel=document.getElementById(id); if(!sel) return ''; return sel.value==='__otro'?(document.getElementById(id+'_otro').value||''):sel.value; }
window.onSitioChange=onSitioChange;

/* Estado general de una tarea, según su grilla de meses del año mostrado.
   Cada celda meses[m] = {e:'plan'|'hecho', f:'YYYY-MM-DD'|null}. */
function mantEstado(r, year){
  const meses=r.meses||{}, now=new Date(), cy=now.getFullYear(), cm=now.getMonth()+1;
  let venc=0, prox=0, plan=0, hecho=0;
  for(let m=1;m<=12;m++){
    const c=meses[m]; if(!c||!c.e) continue;
    if(c.e==='hecho'){ hecho++; continue; }
    plan++;
    if(year<cy || (year===cy && m<cm)) venc++;
    else if(year===cy && m===cm) prox++;
  }
  if(venc) return 'Vencido';
  if(prox) return 'Por vencer';
  if(plan) return 'Pendiente';
  if(hecho) return 'Realizado';
  return '—';
}

/* ================================================================
   CAPA DE DATOS
   - DEMO_MODE: arrays en memoria (this.mem), CRUD local.
   - Producción: sbFetch contra PostgREST (?select=* / POST / PATCH / DELETE).
   ================================================================ */
const mem = {}; // { compras:[...], ... }  solo en demo

async function sbFetch(path, opts={}, _retry=false){
  let token = SB_KEY;
  try{
    const { data } = await sbClient.auth.getSession();
    if(data && data.session && data.session.access_token) token = data.session.access_token;
  }catch(e){}
  const res = await fetch(SB_REST + path, {
    ...opts,
    headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+token, 'Content-Type':'application/json',
      'Prefer':opts.prefer||'return=representation', ...(opts.headers||{}) }
  });
  if(!res.ok){
    if((res.status===401||res.status===403) && !_retry){
      try{ await sbClient.auth.refreshSession(); }catch(_){}
      return sbFetch(path, opts, true);
    }
    const txt = await res.text().catch(()=> '');
    throw new Error('Supabase '+res.status+': '+txt);
  }
  if(res.status===204) return null;
  return res.json();
}
async function sbFetchAll(pathWithSelect){
  const page=1000; let offset=0, all=[];
  for(let i=0;i<60;i++){
    const sep = pathWithSelect.includes('?')?'&':'?';
    const chunk = await sbFetch(pathWithSelect+sep+'limit='+page+'&offset='+offset);
    if(!chunk || !chunk.length) break;
    all=all.concat(chunk);
    if(chunk.length<page) break;
    offset+=page;
  }
  return all;
}

const Data = {
  async list(view){
    if(DEMO_MODE) return (mem[view]||SCHEMAS[view].seed||[]).slice();
    const t = SCHEMAS[view].table;
    try{ return await sbFetch('/'+t+'?select=*&order=id.desc'); }
    catch(e){
      const m=String(e.message||'');
      if(m.includes('PGRST205')||m.includes('Could not find')||m.includes('404')) return (SCHEMAS[view].seed||[]).slice(); // módulo aún sin tabla: mostrar ejemplos
      throw e;
    }
  },
  async add(view, obj){
    if(DEMO_MODE){ const arr=mem[view]; const id=Math.max(0,...arr.map(r=>+r.id||0))+1; const row={id,...obj}; arr.unshift(row); return row; }
    const t = SCHEMAS[view].table;
    return sbFetch('/'+t, {method:'POST', body:JSON.stringify(obj)}).then(r=>r[0]);
  },
  async update(view, id, obj){
    if(DEMO_MODE){ const arr=mem[view]; const i=arr.findIndex(r=>String(r.id)===String(id)); if(i>=0) arr[i]={...arr[i],...obj}; return arr[i]; }
    const t = SCHEMAS[view].table;
    return sbFetch('/'+t+'?id=eq.'+id, {method:'PATCH', body:JSON.stringify(obj)}).then(r=>r[0]);
  },
  async del(view, id){
    if(DEMO_MODE){ mem[view]=mem[view].filter(r=>String(r.id)!==String(id)); return; }
    const t = SCHEMAS[view].table;
    return sbFetch('/'+t+'?id=eq.'+id, {method:'DELETE', prefer:'return=minimal'});
  }
};

async function render(view){
  const s=SCHEMAS[view];
  if(s.custom && view==='mantenimiento'){ return renderMantShell(); }
  if(view==='compras'){ return renderCompras(); }
  if(view==='tesoreria'){ return renderTesoreria(); }
  if(view==='diccionarios'){ return renderDic(); }
  C().innerHTML='<div class="empty">Cargando…</div>';
  let rows=[];
  try{ rows=await Data.list(view); }
  catch(e){ C().innerHTML='<div class="empty" style="color:#b4554e">No se pudo cargar: '+esc(e.message)+'</div>'; return; }

  // KPIs
  const kpis=(s.kpis||[]).map(k=>{
    const val=k.calc(rows);
    return '<div class="kpi"><div class="kpi-label">'+esc(k.label)+'</div>'
      +'<div class="kpi-value '+(k.tone||'')+'">'+esc(val)+'</div>'
      +'<div class="kpi-sub">'+esc(k.sub||'')+'</div></div>';
  }).join('');

  // Tabla
  let body;
  if(!rows.length){
    body='<div class="empty">Sin registros todavía. Usá “Nuevo” para cargar el primero.</div>';
  }else{
    const th=s.cols.map(c=>'<th>'+esc(c.label)+'</th>').join('')+'<th style="text-align:right">Acciones</th>';
    const tr=rows.map(r=>{
      const tds=s.cols.map(c=>{
        let v = c.auto ? c.auto(r) : r[c.key];
        if(c.fmt) v=c.fmt(v);
        else if(c.badge) return '<td>'+badge(c.auto?c.auto(r):r[c.key])+'</td>';
        return '<td>'+esc(v==null||v===''?'—':v)+'</td>';
      }).join('');
      return '<tr>'+tds
        +'<td><div class="row-actions">'
        +'<button class="iconbtn" title="Editar" onclick="openForm(\''+view+'\','+r.id+')">'+ICO.edit+'</button>'
        +'<button class="iconbtn del" title="Eliminar" onclick="askDel(\''+view+'\','+r.id+')">'+ICO.del+'</button>'
        +'</div></td></tr>';
    }).join('');
    body='<table class="grid"><thead><tr>'+th+'</tr></thead><tbody>'+tr+'</tbody></table>';
  }

  const demoTag = DEMO_MODE ? '<span class="demo-tag">DATOS DE EJEMPLO</span>' : '';
  C().innerHTML =
    '<div class="kpi-grid cols-2">'+kpis+'</div>'
    +'<div class="card"><div class="card-h"><h3>'+esc(s.title)+demoTag+'</h3>'
    +'<span class="meta">'+rows.length+' registro(s)</span></div>'+body+'</div>';
}

/* ---- Alta / Edición (reusa el .modal del molde) ---- */
function openForm(view, id){
  const s=SCHEMAS[view];
  const row = id!=null ? (DEMO_MODE?mem[view]:[]).find(r=>String(r.id)===String(id)) : null;
  // en producción, para editar traeríamos la fila; acá el motor pasa el id y PATCH/actualiza.
  const cur = row || {};
  const fields = s.form.map(f=>{
    const v = cur[f.key]!=null ? cur[f.key] : '';
    let input;
    if(f.type==='select'){
      input='<select id="f_'+f.key+'">'+f.opts.map(o=>'<option'+(o===v?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
    }else if(f.type==='textarea'){
      input='<textarea id="f_'+f.key+'">'+esc(v)+'</textarea>';
    }else{
      input='<input id="f_'+f.key+'" type="'+(f.type||'text')+'" value="'+esc(v)+'">';
    }
    return {half:f.half, html:'<div class="field"><label>'+esc(f.label)+'</label>'+input+'</div>'};
  });
  // agrupa campos "half" de a dos en .frow.c2
  let bodyHtml='', i=0;
  while(i<fields.length){
    if(fields[i].half && fields[i+1] && fields[i+1].half){
      bodyHtml+='<div class="frow c2">'+fields[i].html+fields[i+1].html+'</div>'; i+=2;
    }else{ bodyHtml+=fields[i].html; i++; }
  }
  openModal(
    (id!=null?'Editar ':'Nuevo ')+s.title.toLowerCase().replace(/s$/,''),
    bodyHtml,
    '<button class="btn ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn" onclick="saveForm(\''+view+'\','+(id!=null?id:'null')+')">Guardar</button>'
  );
}
window.openForm=openForm;

async function saveForm(view, id){
  const s=SCHEMAS[view];
  const obj={};
  s.form.forEach(f=>{
    const el=document.getElementById('f_'+f.key); if(!el) return;
    let v=el.value;
    if(f.type==='number') v = v===''?null:+v;
    obj[f.key]=v;
  });
  try{
    if(id==null||id==='null') await Data.add(view, obj);
    else await Data.update(view, id, obj);
    closeModal(); toast('Guardado'); render(view);
  }catch(e){ toast('Error: '+e.message); }
}
window.saveForm=saveForm;

    '<button class="btn ghost" onclick="closeModal()">Cancelar</button>'

async function mantList(){
  let rows;
  if(DEMO_MODE) rows=(mem.mantenimiento||[]).slice();
  else rows=await sbFetch('/mantenimiento?select=*&anio=eq.'+MANT_YEAR+'&order=id.desc');
  return rows.filter(r=>(+r.anio||MANT_YEAR)===MANT_YEAR);
}

function mesStrip(r){
  const meses=r.meses||{};
  let cells='';
  for(let m=1;m<=12;m++){
    const c=meses[m];
    if(!c||!c.e) cells+='<div class="mcell" title="'+MESES[m-1]+'"></div>';
    else if(c.e==='hecho') cells+='<div class="mcell hecho" title="'+MESES[m-1]+': realizado'+(c.f?' ('+fmtDate(c.f)+')':'')+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg></div>';
    else cells+='<div class="mcell plan" title="'+MESES[m-1]+': planificado">'+MESES[m-1][0]+'</div>';
  }
  return '<div><div class="mstrip-lbl">'+MESES.map(m=>'<span>'+m[0]+'</span>').join('')+'</div><div class="mstrip">'+cells+'</div></div>';
}

function MI(){ return document.getElementById('mantInner'); }

/* Shell de Mantenimiento: barra de pestañas + contenedor interno */
async function renderMantShell(){
  const tab=(id,lbl)=>'<button class="mtab'+(MANT_TAB===id?' active':'')+'" onclick="setMantTab(\''+id+'\')">'+lbl+'</button>';
  C().innerHTML='<div class="mtabs">'+tab('resumen','Resumen')+tab('programa','Programa anual')+tab('control','Inspecciones')+tab('herr','Herramientas')+'</div><div id="mantInner"></div>';
  if(MANT_TAB==='resumen') await renderResumen();
  else if(MANT_TAB==='programa') await renderPrograma();
  else if(MANT_TAB==='control') await renderCtrl();
  else await renderHerr();
}

async function renderPrograma(){
  MI().innerHTML='<div class="empty">Cargando…</div>';
  let rows;
  try{ rows=await mantList(); }
  catch(e){ MI().innerHTML='<div class="empty" style="color:#b4554e">No se pudo cargar: '+esc(e.message)+'</div>'; return; }

  // KPIs de cumplimiento del año mostrado
  const now=new Date(), cy=now.getFullYear(), cm=now.getMonth()+1;
  let vencRows=0, proxRows=0, dueCells=0, doneDue=0, presup=0, real=0;
  rows.forEach(r=>{
    presup+=(+r.presupuesto||0); real+=(+r.costo_real||0);
    const est=mantEstado(r, MANT_YEAR);
    if(est==='Vencido') vencRows++; else if(est==='Por vencer') proxRows++;
    const meses=r.meses||{};
    for(let m=1;m<=12;m++){
      const c=meses[m]; if(!c||!c.e) continue;
      const vencido = MANT_YEAR<cy || (MANT_YEAR===cy && m<=cm);
      if(c.e==='hecho'){ if(vencido){dueCells++;doneDue++;} }
      else if(vencido){ dueCells++; }
    }
  });
  const cumpl = dueCells? Math.round(doneDue/dueCells*100) : 100;
  const K=(label,val,sub,tone)=>'<div class="kpi"><div class="kpi-label">'+label+'</div><div class="kpi-value '+(tone||'')+'">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';
  const kpis=
     K('Vencidos', vencRows, 'Planificado y ya pasó, sin confirmar', vencRows?'bad':'')
    +K('Por vencer', proxRows, 'Planificado para este mes')
    +K('Cumplimiento', cumpl+'%', doneDue+' de '+dueCells+' a la fecha', cumpl>=80?'ok':(cumpl<50?'bad':''))
    +K('Costo real', fmtMoney(real), 'Ejecutado en el año')
    +K('Costo presupuesto', fmtMoney(presup), 'Planificado en el año');

  let body;
  if(!rows.length){
    body='<div class="empty">Sin tareas para '+MANT_YEAR+'. Usá “Nueva tarea” para cargar la primera.</div>';
  }else{
    MANT_ROWS=rows;
    const tr=rows.map(r=>{
      const uds=r.unidades||[];
      const exp=MANT_EXPANDED.has(r.id);
      const caret='<button class="uexp" title="'+(exp?'Contraer':'Ver detalle')+'" onclick="toggleUnid('+r.id+')">'
        +(exp?'−':'+')+'</button>';
      const count=uds.length?'<span class="ucount">'+uds.length+'</span>':'';
      let main='<tr>'
        +'<td><div style="display:flex;align-items:center;gap:8px">'+caret
        +'<div><strong>'+esc(r.bien||'—')+'</strong>'+count
        +(r.marca?'<div style="font-size:11.5px;color:var(--muted)">'+esc(r.marca)+'</div>':'')+'</div></div></td>'
        +'<td>'+esc(r.periodicidad||'—')+'</td>'
        +'<td>'+esc(r.empresa||'—')+'</td>'
        +'<td>'+esc(r.responsable||'—')+'</td>'
        +'<td>'+mesStrip(r)+'</td>'
        +'<td>'+badge(mantEstado(r,MANT_YEAR))+'</td>'
        +'<td><div class="row-actions">'
        +'<button class="iconbtn" title="Editar" onclick="openFormMant('+r.id+')">'+ICO.edit+'</button>'
        +'<button class="iconbtn del" title="Eliminar" onclick="askDel(\'mantenimiento\','+r.id+')">'+ICO.del+'</button>'
        +'</div></td></tr>';
      if(exp) main+=detalleUnidades(r);
      return main;
    }).join('');
    body='<table class="grid"><thead><tr>'
      +'<th>Bien / servicio</th><th>Periodicidad</th><th>Empresa</th><th>Responsable</th>'
      +'<th>Plan '+MANT_YEAR+' (E–D)</th><th>Estado</th><th style="text-align:right">Acciones</th>'
      +'</tr></thead><tbody>'+tr+'</tbody></table>';
  }

  const demoTag = DEMO_MODE ? '<span class="demo-tag">DATOS DE EJEMPLO</span>' : '';
  MI().innerHTML =
    '<div class="kpi-grid">'+kpis+'</div>'
    +'<div class="card"><div class="card-h"><h3>Programa '+MANT_YEAR+demoTag+'</h3>'
    +'<span class="meta">'+rows.length+' tarea(s) · ámbar = planificado · verde = realizado</span></div>'+body+'</div>';
}

/* ---- Alta / edición con selector de meses ---- */
function openFormMant(id){
  const s=SCHEMAS.mantenimiento;
  const row = id!=null ? (DEMO_MODE?mem.mantenimiento:[]).find(r=>String(r.id)===String(id)) : null;
  const cur = row || {};
  MANT_EDIT = JSON.parse(JSON.stringify(cur.meses||{}));   // copia editable

  // campos de texto/número (reusa el patrón del molde)
  const fields = s.form.map(f=>{
    const v = cur[f.key]!=null ? cur[f.key] : '';
    let input;
    if(f.type==='textarea') input='<textarea id="f_'+f.key+'">'+esc(v)+'</textarea>';
    else if(f.type==='select') input='<select id="f_'+f.key+'">'+f.opts.map(o=>'<option'+(o===v?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';
    else input='<input id="f_'+f.key+'" type="'+(f.type||'text')+'" value="'+esc(v)+'">';
    return {half:f.half, html:'<div class="field"><label>'+esc(f.label)+'</label>'+input+'</div>'};
  });
  let top='', i=0;
  while(i<fields.length){
    if(fields[i].half && fields[i+1] && fields[i+1].half){ top+='<div class="frow c2">'+fields[i].html+fields[i+1].html+'</div>'; i+=2; }
    else{ top+=fields[i].html; i++; }
  }

  const body = top
    +'<div class="field"><label>Planificación '+MANT_YEAR+' — tocá cada mes: (–) no aplica · (P) planificado · (✓) realizado</label>'
    +'<div id="mselBox"></div></div>';

  openModal((id!=null?'Editar tarea':'Nueva tarea')+' · '+MANT_YEAR, body,
    '<button class="btn ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn" onclick="saveFormMant('+(id!=null?id:'null')+')">Guardar</button>');
  renderMsel();
}
window.openFormMant=openFormMant;

function renderMsel(){
  const box=document.getElementById('mselBox'); if(!box) return;
  let html='<div class="msel">';
  for(let m=1;m<=12;m++){
    const c=MANT_EDIT[m]||{}; const e=c.e||'';
    html+='<div class="mbox"><div class="mname">'+MESES[m-1]+'</div>'
      +'<div class="mtoggle">'
      +'<button onclick="setMes('+m+',\'\')" class="'+(e===''?'':'')+'">–</button>'
      +'<button onclick="setMes('+m+',\'plan\')" class="'+(e==='plan'?'on-plan':'')+'">P</button>'
      +'<button onclick="setMes('+m+',\'hecho\')" class="'+(e==='hecho'?'on-hecho':'')+'">✓</button>'
      +'</div>';
    if(e==='hecho') html+='<input type="date" value="'+esc(c.f||(MANT_YEAR+'-'+String(m).padStart(2,'0')+'-01'))+'" onchange="setMesFecha('+m+',this.value)">';
    html+='</div>';
  }
  html+='</div>';
  box.innerHTML=html;
}
function setMes(m,e){
  if(!e) delete MANT_EDIT[m];
  else { const prev=MANT_EDIT[m]||{}; MANT_EDIT[m]={e, f: e==='hecho' ? (prev.f||MANT_YEAR+'-'+String(m).padStart(2,'0')+'-01') : null}; }
  renderMsel();
}
function setMesFecha(m,v){ if(MANT_EDIT[m]) MANT_EDIT[m].f=v; }
window.setMes=setMes; window.setMesFecha=setMesFecha;

async function saveFormMant(id){
  const s=SCHEMAS.mantenimiento; const obj={anio:MANT_YEAR, meses:MANT_EDIT};
  s.form.forEach(f=>{ const el=document.getElementById('f_'+f.key); if(!el) return; let v=el.value; if(f.type==='number') v=v===''?null:+v; obj[f.key]=v; });

function mantRow(id){ return (DEMO_MODE?mem.mantenimiento:MANT_ROWS).find(r=>String(r.id)===String(id)); }

function detalleUnidades(r){
  const uds=r.unidades||[];
  const inner = uds.length
    ? '<table class="grid usub"><thead><tr><th>#</th><th>Código</th><th>Ubicación en el taller</th><th>Antigüedad</th><th style="text-align:right"></th></tr></thead><tbody>'
      +uds.map((u,i)=>{ const edad=edadAAAAMM(u.antiguedad); return '<tr><td style="color:var(--muted)">'+(i+1)+'</td><td><strong>'+esc(u.codigo||'—')+'</strong></td><td>'+esc(u.ubicacion||'—')+'</td>'
        +'<td>'+(u.antiguedad?esc(u.antiguedad)+(edad?' <span style="color:var(--muted)">('+edad+')</span>':''):'—')+'</td>'
        +'<td><div class="row-actions">'
        +'<button class="iconbtn" title="Editar" onclick="openUnidadForm('+r.id+','+i+')">'+ICO.edit+'</button>'
        +'<button class="iconbtn del" title="Eliminar" onclick="delUnidad('+r.id+','+i+')">'+ICO.del+'</button>'
        +'</div></td></tr>'; }).join('')
      +'</tbody></table>'
    : '<div style="font-size:13px;color:var(--muted);padding:4px 0 10px">Todavía no hay unidades cargadas para esta línea.</div>';
  return '<tr class="detail-row"><td colspan="7"><div class="detail-wrap">'
    +'<div class="detail-h"><span>Detalle de unidades — '+esc(r.bien||'')+'</span>'
    +'<button class="btn ghost sm" onclick="openUnidadForm('+r.id+')">'+ICO.plus+'Agregar unidad</button></div>'
    +inner+'</div></td></tr>';

function toggleUnid(id){ if(MANT_EXPANDED.has(id)) MANT_EXPANDED.delete(id); else MANT_EXPANDED.add(id); renderPrograma(); }

/* ================================================================
   CONTROL DE HERRAMIENTAS (estado de funcionamiento del bien)
   Modelo nativo: cada inspección queda guardada y se lista por AAAAMM.
   Cada ítem del Programa es el bien inspeccionable (con su checklist a medida).
   Al registrar una inspección se marca ese mes como realizado en el Programa.
   Demo: mem.inspecciones.  Producción: tabla inspecciones (+ columna checklist en mantenimiento).
   ================================================================ */
function periodoDeFecha(f){ const p=String(f).slice(0,7).split('-'); return p.length===2?p[0]+p[1]:''; }   // YYYY-MM -> YYYYMM
function fmtPeriodo(p){ return p&&p.length===6 ? MESES[(+p.slice(4)-1)]+' '+p.slice(0,4) : p; }

let INSP_CHK=[];   // checklist en edición (editor de informe a medida)
function programaItems(year){ return (DEMO_MODE?mem.mantenimiento:MANT_ROWS).filter(r=>(+r.anio||year)===year); }
function inspecItem(id){ return (DEMO_MODE?mem.mantenimiento:MANT_ROWS).find(r=>String(r.id)===String(id)); }
function inspecList(itemId){ return (DEMO_MODE?mem.inspecciones:[]).filter(a=>String(a.item_id)===String(itemId)); }

async function renderCtrl(){
  MI().innerHTML='<div class="empty">Cargando…</div>';
  let items;
  try{
    if(!DEMO_MODE) MANT_ROWS=await mantList();
    items=programaItems(MANT_YEAR);
  }catch(e){ MI().innerHTML='<div class="empty" style="color:#b4554e">No se pudo cargar: '+esc(e.message)+'</div>'; return; }

  const demoTag = DEMO_MODE ? '<span class="demo-tag">DATOS DE EJEMPLO</span>' : '';
  if(!items.length){ MI().innerHTML='<div class="empty">No hay ítems en el Programa '+MANT_YEAR+'. Cargalos en la solapa “Programa anual”.</div>'; return; }

  const cards=items.map(it=>{
    const chk=it.checklist||[];
    const list=inspecList(it.id).slice().sort((x,y)=>String(y.periodo).localeCompare(String(x.periodo)));
    const chips = list.length
      ? list.map(a=>'<button class="audit-chip" title="Ver inspección '+esc(a.periodo)+'" onclick="viewInsp('+a.id+')">'+esc(a.periodo)+'</button>').join('')
      : '<span style="font-size:12.5px;color:var(--muted)">Sin inspecciones anteriores.</span>';
    const chkInfo = chk.length ? chk.length+' ítems de verificación' : '<span style="color:#b0584f">Sin checklist definido</span>';
    return '<div class="card" style="margin-bottom:14px">'
      +'<div class="card-h"><div><h3>'+esc(it.bien||'—')+'</h3>'
      +'<div class="meta">'+esc(it.periodicidad||'—')+(it.empresa?' · '+esc(it.empresa):'')+(it.responsable?' · '+esc(it.responsable):'')+' · '+chkInfo+'</div></div>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="btn sm" onclick="openInspForm('+it.id+')">'+ICO.plus+'Registrar inspección</button>'
      +'<button class="iconbtn" title="Editar checklist a medida" onclick="openChkEditor('+it.id+')">'+ICO.edit+'</button>'
      +'</div></div>'
      +'<div style="padding:14px 20px"><div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px">Inspecciones anteriores (AAAAMM)</div>'
      +'<div class="audit-list">'+chips+'</div></div>'
      +'</div>';
  }).join('');

  MI().innerHTML='<div style="margin-bottom:14px;font-size:13px;color:var(--muted)">Cada ítem del Programa es un bien inspeccionable, con su checklist a medida. Al registrar una inspección se marca ese mes como <strong>realizado</strong> en el Programa. '+demoTag+'</div>'+cards;
}

/* ---- Render de verificación según modo ---- */
function checklistHtml(items, resultados, readonly){
  if(!items||!items.length) return '<div class="empty">Este ítem no tiene checklist definido. Usá el lápiz para crearlo.</div>';
  return '<table class="grid chk"><thead><tr><th>Ítem</th>'
    +CTRL_ESCALA.map(x=>'<th style="text-align:center">'+x+'</th>').join('')+'</tr></thead><tbody>'
    +items.map((it,idx)=>{
      const val=(resultados&&resultados[idx])||'';
      const cells=CTRL_ESCALA.map(x=>{
        if(readonly) return '<td style="text-align:center">'+(val===x?'<span class="chk-dot on-'+x+'">'+x+'</span>':'·')+'</td>';
        return '<td style="text-align:center"><label class="chk-r"><input type="radio" name="chk_'+idx+'" value="'+x+'"'+(val===x?' checked':'')+'><span class="on-'+x+'">'+x+'</span></label></td>';
      }).join('');
      return '<tr><td>'+esc(it)+'</td>'+cells+'</tr>';
    }).join('')+'</tbody></table>'
    +'<div style="font-size:11.5px;color:var(--muted);margin-top:6px">C = Cumple · NC = No Cumple · NA = No Aplica</div>';
}

/* ---- Registrar inspección ---- */
function openInspForm(itemId){
  const it=inspecItem(itemId); if(!it) return;
  const chk=it.checklist||[];
  if(!chk.length){ toast('Definí primero el checklist'); openChkEditor(itemId); return; }
  const hoy=new Date().toISOString().slice(0,10);
  const body='<div class="frow c2"><div class="field"><label>Sitio / Sector</label>'+sitioField('c_sitio','')+'</div>'
    +'<div class="field"><label>Fecha de la inspección</label><input id="c_fecha" type="date" value="'+hoy+'"></div></div>'
    +'<div style="font-size:11.5px;color:var(--muted);margin:-4px 0 12px">Al guardar se marcará como realizado el mes de esta fecha en el Programa.</div>'
    +'<div class="field"><label>Verificación — '+esc(it.bien||'')+'</label>'+checklistHtml(chk,{},false)+'</div>'
    +'<div class="field"><label>Observaciones</label><textarea id="c_obs"></textarea></div>'
    +'<div class="field"><label>Acción ante desvío (si hubo No Cumple)</label><textarea id="c_accion"></textarea></div>';
  openModal('Registrar inspección · '+esc(it.bien||''), body,
    '<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveInsp('+itemId+')">Guardar inspección</button>');
}
window.openInspForm=openInspForm;

async function saveInsp(itemId){
  const it=inspecItem(itemId); const chk=it.checklist||[];
  const fecha=document.getElementById('c_fecha').value;
  if(!fecha){ toast('Poné la fecha'); return; }
  const resultados={};
  chk.forEach((x,idx)=>{ const sel=document.querySelector('input[name="chk_'+idx+'"]:checked'); if(sel) resultados[idx]=sel.value; });
  const obj={ item_id:itemId, periodo:periodoDeFecha(fecha), fecha, sitio:sitioValue('c_sitio'),
    resultados, observaciones:document.getElementById('c_obs').value, accion:document.getElementById('c_accion').value };
  if(DEMO_MODE){ const arr=mem.inspecciones; obj.id=Math.max(0,...arr.map(r=>+r.id||0))+1; arr.push(obj); }
  else await sbFetch('/inspecciones',{method:'POST',body:JSON.stringify(obj)});
  await markMonthDone(it, fecha);
  closeModal(); toast('Inspección guardada · mes marcado realizado ('+obj.periodo+')'); renderCtrl();
}
window.saveInsp=saveInsp;

async function markMonthDone(item, fecha){
  const m=+String(fecha).slice(5,7); if(!m) return;
  const meses=Object.assign({}, item.meses||{});
  meses[m]={e:'hecho', f:fecha};
  if(DEMO_MODE){ const r=mem.mantenimiento.find(x=>String(x.id)===String(item.id)); if(r) r.meses=meses; }
  else await sbFetch('/mantenimiento?id=eq.'+item.id,{method:'PATCH',body:JSON.stringify({meses})});
}

function viewInsp(inspId){
  const a=(DEMO_MODE?mem.inspecciones:[]).find(x=>String(x.id)===String(inspId));
  const it=inspecItem(a.item_id);
  const body='<div style="font-size:12.5px;color:var(--muted);margin-bottom:12px">'
    +'<strong style="color:var(--ink)">'+esc(it?it.bien:'—')+'</strong> · '+esc(fmtPeriodo(a.periodo))+' · '+fmtDate(a.fecha)+(a.sitio?' · '+esc(a.sitio):'')+'</div>'
    +checklistHtml(it?it.checklist:[], a.resultados, true)
    +(a.observaciones?'<div class="field" style="margin-top:14px"><label>Observaciones</label><div style="font-size:13.5px">'+esc(a.observaciones)+'</div></div>':'')
    +(a.accion?'<div class="field"><label>Acción ante desvío</label><div style="font-size:13.5px">'+esc(a.accion)+'</div></div>':'');
  openModal('Inspección '+esc(a.periodo), body, '<button class="btn ghost" onclick="closeModal()">Cerrar</button>');
}
window.viewInsp=viewInsp;

/* ---- Editor del checklist a medida ---- */
function openChkEditor(itemId){
  const it=inspecItem(itemId); if(!it) return;
  INSP_CHK=(it.checklist||[]).slice();
  const body='<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">Definí los ítems que se verifican en la inspección de <strong>'+esc(it.bien||'')+'</strong>.</div>'

window.openChkEditor=openChkEditor;
function renderChkBox(){

function addChk(){ INSP_CHK.push(''); renderChkBox(); }
function delChk(i){ INSP_CHK.splice(i,1); renderChkBox(); }
window.addChk=addChk; window.delChk=delChk;
async function saveChk(itemId){
  const chk=INSP_CHK.map(s=>String(s).trim()).filter(Boolean);
  if(DEMO_MODE){ const r=mem.mantenimiento.find(x=>String(x.id)===String(itemId)); if(r) r.checklist=chk; }
  else await sbFetch('/mantenimiento?id=eq.'+itemId,{method:'PATCH',body:JSON.stringify({checklist:chk})});

window.saveChk=saveChk;

/* ================================================================
   HERRAMIENTAS (pañol): listado con buscador + operaciones
   Operaciones por herramienta: préstamo, alquiler, reparación.
   Demo: mem.herramientas / mem.herr_ops.
   Producción: tablas herramientas y herr_operaciones.
   ================================================================ */
let HERR_SEARCH='';
const HERR_EXPANDED=new Set();   // series (instancias) expandidas
const HERR_ART=new Set();        // artículos expandidos

const OP_DEFS={
  prestamo:{ label:'Préstamo', fields:[
    {k:'fecha',l:'Fecha',t:'date',half:true},
    {k:'persona',l:'Persona a la que se prestó',t:'text',half:true},
    {k:'desde',l:'Desde',t:'date',half:true},
    {k:'hasta',l:'Hasta',t:'date',half:true},
  ]},
  alquiler:{ label:'Alquiler', fields:[
    {k:'fecha',l:'Fecha',t:'date',half:true},
    {k:'persona',l:'Persona / empresa',t:'text',half:true},
    {k:'desde',l:'Desde',t:'date',half:true},
    {k:'hasta',l:'Hasta',t:'date',half:true},
    {k:'precio',l:'Precio de alquiler',t:'number'},
  ]},
  reparacion:{ label:'Reparación', fields:[
    {k:'fecha_envio',l:'Fecha de envío a reparación',t:'date',half:true},
    {k:'fecha_recepcion',l:'Fecha de recepción (reparada)',t:'date',half:true},
    {k:'proveedor',l:'Proveedor',t:'text'},
    {k:'oc',l:'N° de OC',t:'text',half:true},
    {k:'costo',l:'Costo',t:'number',half:true},
  ]},
};

function herrOps(id){ return (DEMO_MODE?mem.herr_ops:[]).filter(o=>String(o.herr_id)===String(id)); }
function herrEstado(h){
  const my=herrOps(h.id), today=new Date().toISOString().slice(0,10);
  if(my.some(o=>o.tipo==='reparacion' && o.fecha_envio && !o.fecha_recepcion)) return 'En reparación';
  const vig=my.filter(o=>(o.tipo==='prestamo'||o.tipo==='alquiler') && (!o.hasta || o.hasta>=today));
  if(vig.some(o=>o.tipo==='alquiler')) return 'Alquilada';
  if(vig.length) return 'Prestada';
  return 'Disponible';
}

async function renderHerr(){
  MI().innerHTML=
    '<div style="margin-bottom:12px;font-size:13px;color:var(--muted)">Buscá un artículo, abrí sus series, y en cada serie registrá préstamos, alquileres o reparaciones. '
    +(DEMO_MODE?'<span class="demo-tag">DATOS DE EJEMPLO</span>':'')+'</div>'
    +'<div style="position:relative;margin-bottom:14px;max-width:460px">'
    +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:17px;height:17px;position:absolute;left:12px;top:12px;color:var(--muted)"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>'
    +'<input id="herrSearch" type="text" value="'+esc(HERR_SEARCH)+'" oninput="filterHerr(this.value)" placeholder="Buscar por artículo, código, serie o marca…" '
    +'style="width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px 10px 36px;font-size:14px;background:#fff">'
    +'</div><div id="herrTableBox"></div>';
  paintHerrTable();
  const inp=document.getElementById('herrSearch'); if(inp && HERR_SEARCH){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
}
function filterHerr(v){ HERR_SEARCH=v; paintHerrTable(); }
window.filterHerr=filterHerr;

function agruparHerr(){
  const all=(DEMO_MODE?mem.herramientas:[]);
  const map=new Map();
  all.forEach(h=>{
    const key=h.codigo || ('D_'+String(h.descripcion||'').replace(/[^A-Za-z0-9]/g,''));
    if(!map.has(key)) map.set(key,{key, codigo:h.codigo, descripcion:h.descripcion, categoria:h.categoria, series:[]});
    map.get(key).series.push(h);
  });
  return [...map.values()];
}

function paintHerrTable(){
  const box=document.getElementById('herrTableBox'); if(!box) return;
  let arts=agruparHerr();
  const q=HERR_SEARCH.trim().toLowerCase();
  if(q) arts=arts.filter(a=>[a.descripcion,a.codigo,a.categoria].some(x=>String(x||'').toLowerCase().includes(q))
      || a.series.some(s=>[s.serie,s.marca].some(x=>String(x||'').toLowerCase().includes(q))));
  if(!arts.length){ box.innerHTML='<div class="empty">Sin resultados'+(q?' para “'+esc(HERR_SEARCH)+'”':'')+'.</div>'; return; }

  const tr=arts.map(a=>{
    const exp=HERR_ART.has(a.key);
    const caret='<button class="uexp" onclick="toggleArt(\''+a.key+'\')">'+(exp?'−':'+')+'</button>';
    let disp=0,uso=0,rep=0;
    a.series.forEach(s=>{ const e=herrEstado(s); if(e==='En reparación')rep++; else if(e==='Disponible')disp++; else uso++; });
    const chips='<span class="badge b-verde">'+disp+' disp.</span>'+(uso?' <span class="badge b-azul">'+uso+' en uso</span>':'')+(rep?' <span class="badge b-ambar">'+rep+' rep.</span>':'');
    let main='<tr>'
      +'<td><div style="display:flex;align-items:center;gap:8px">'+caret
      +'<div><strong>'+esc(a.descripcion||'—')+'</strong><div style="font-size:11.5px;color:var(--muted)">'+esc(a.codigo||'')+'</div></div></div></td>'
      +'<td>'+esc(a.categoria||'—')+'</td>'
      +'<td><span class="ucount">'+a.series.length+'</span></td>'
      +'<td>'+chips+'</td>'
      +'<td></td></tr>';
    if(exp) main+=articleDetail(a);
    return main;
  }).join('');
  box.innerHTML='<div class="card"><div class="card-h"><h3>Herramientas</h3><span class="meta">'+arts.length+' artículo(s)</span></div>'
    +'<table class="grid"><thead><tr><th>Artículo</th><th>Categoría</th><th>Series</th><th>Disponibilidad</th><th></th></tr></thead><tbody>'+tr+'</tbody></table></div>';
}
function toggleArt(key){ if(HERR_ART.has(key)) HERR_ART.delete(key); else HERR_ART.add(key); paintHerrTable(); }
window.toggleArt=toggleArt;

function articleDetail(a){
  const sr=a.series.map(s=>{
    const e2=HERR_EXPANDED.has(s.id);
    const c2='<button class="uexp" onclick="toggleHerr('+s.id+')">'+(e2?'−':'+')+'</button>';
    const edad=edadAAAAMM(s.alta);
    let row='<tr>'
      +'<td><div style="display:flex;align-items:center;gap:8px">'+c2+'<strong>'+esc(s.serie||'—')+'</strong></div></td>'
      +'<td>'+(s.alta?esc(s.alta)+(edad?' <span style="color:var(--muted)">('+edad+')</span>':''):'—')+'</td>'
      +'<td>'+esc(s.marca||'—')+'</td>'
      +'<td>'+badge(herrEstado(s))+'</td>'
      +'<td><span class="ucount">'+herrOps(s.id).length+'</span></td>'
      +'<td><div class="row-actions"><button class="iconbtn" title="Editar" onclick="openHerrForm('+s.id+')">'+ICO.edit+'</button>'
      +'<button class="iconbtn del" title="Eliminar" onclick="askDelHerr('+s.id+')">'+ICO.del+'</button></div></td></tr>';
    if(e2) row+=serieOps(s);
    return row;
  }).join('');
  return '<tr class="detail-row"><td colspan="5"><div class="detail-wrap">'
    +'<div class="detail-h"><span>Series de '+esc(a.descripcion||'')+'</span>'
    +'<button class="btn ghost sm" onclick="openHerrForm(null,\''+(a.codigo||'')+'\')">'+ICO.plus+'Agregar serie</button></div>'
    +'<table class="grid usub"><thead><tr><th>Serie</th><th>Antigüedad</th><th>Marca</th><th>Estado</th><th>Op.</th><th></th></tr></thead><tbody>'+sr+'</tbody></table>'
    +'</div></td></tr>';
}

function opDetalle(o){
  if(o.tipo==='prestamo') return esc(o.persona||'—')+' <span style="color:var(--muted)">('+fmtDate(o.desde)+' → '+fmtDate(o.hasta)+')</span>';
  if(o.tipo==='alquiler') return esc(o.persona||'—')+' <span style="color:var(--muted)">('+fmtDate(o.desde)+' → '+fmtDate(o.hasta)+')</span> · '+fmtMoney(o.precio);
  return esc(o.proveedor||'—')+(o.oc?' · OC '+esc(o.oc):'')+' · '+fmtMoney(o.costo)
    +' <span style="color:var(--muted)">(envío '+fmtDate(o.fecha_envio)+' · '+(o.fecha_recepcion?'recibida '+fmtDate(o.fecha_recepcion):'pendiente')+')</span>';
}
function opFecha(o){ return o.tipo==='reparacion' ? o.fecha_envio : o.fecha; }

function serieOps(s){
  const ops=herrOps(s.id).slice().sort((a,b)=>String(opFecha(b)||'').localeCompare(String(opFecha(a)||'')));
  const rows= ops.length
    ? '<table class="grid usub" style="background:#fff"><thead><tr><th>Tipo</th><th>Fecha</th><th>Detalle</th><th style="text-align:right"></th></tr></thead><tbody>'

        +'<td><div class="row-actions">'

function donut(pct, color){
  pct=Math.max(0,Math.min(100,pct||0));
  const r=52, c=2*Math.PI*r, off=c*(1-pct/100);
  return '<svg viewBox="0 0 140 140" style="width:118px;height:118px">'
    +'<circle cx="70" cy="70" r="'+r+'" fill="none" stroke="var(--line)" stroke-width="15"/>'
    +'<circle cx="70" cy="70" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="15" stroke-linecap="round" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 70 70)"/>'
    +'<text x="70" y="78" text-anchor="middle" font-size="27" font-weight="700" fill="var(--ink)">'+Math.round(pct)+'%</text></svg>';
}
function stackBar(parts){
  const total=parts.reduce((a,p)=>a+p.val,0)||1;
  return '<div style="display:flex;height:24px;border-radius:7px;overflow:hidden;border:1px solid var(--line)">'
    +parts.map(p=>p.val?'<div title="'+p.label+': '+p.val+'" style="width:'+(p.val/total*100)+'%;background:'+p.color+'"></div>':'').join('')+'</div>'
    +'<div style="display:flex;gap:16px;margin-top:8px;font-size:12px;flex-wrap:wrap">'
    +parts.map(p=>'<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:11px;height:11px;border-radius:3px;background:'+p.color+';display:inline-block"></span>'+p.label+' <strong>'+p.val+'</strong></span>').join('')+'</div>';
}

function programaMetrics(year){
  const rows=(DEMO_MODE?mem.mantenimiento:[]).filter(r=>(+r.anio||year)===year);
  const now=new Date(), cy=now.getFullYear(), cm=now.getMonth()+1;
  let vencRows=0,proxRows=0,dueCells=0,doneDue=0,presup=0,real=0;
  rows.forEach(r=>{ presup+=(+r.presupuesto||0); real+=(+r.costo_real||0);
    const est=mantEstado(r,year); if(est==='Vencido')vencRows++; else if(est==='Por vencer')proxRows++;
    const meses=r.meses||{};
    for(let m=1;m<=12;m++){ const c=meses[m]; if(!c||!c.e) continue; const vencido=year<cy||(year===cy&&m<=cm);
      if(c.e==='hecho'){ if(vencido){dueCells++;doneDue++;} } else if(vencido) dueCells++; }
  });
  return {rows, vencRows, proxRows, dueCells, doneDue, cumpl:(dueCells?Math.round(doneDue/dueCells*100):100), presup, real};
}
function inspecMetrics(){
  const items=(DEMO_MODE?mem.mantenimiento:[]).filter(r=>(+r.anio||MANT_YEAR)===MANT_YEAR);
  const insps=(DEMO_MODE?mem.inspecciones:[]);
  let C=0,NC=0,NA=0,auditados=0;
  items.forEach(it=>{
    const list=insps.filter(a=>String(a.item_id)===String(it.id)).sort((x,y)=>String(y.periodo).localeCompare(String(x.periodo)));
    if(!list.length) return; auditados++;
    const last=list[0];
    if(last.resultados) Object.values(last.resultados).forEach(v=>{ if(v==='C')C++; else if(v==='NC')NC++; else if(v==='NA')NA++; });
  });
  return {C,NC,NA,auditados,totalBienes:items.length};
}
function herrMetricsByYear(){
  const ops=(DEMO_MODE?mem.herr_ops:[]), byY={};
  ops.forEach(o=>{ const f=opFecha(o); const y=f?String(f).slice(0,4):'—';
    const b=byY[y]||(byY[y]={prestamos:0,alquileres:0,ingresos:0,reparaciones:0,costoRep:0});
    if(o.tipo==='prestamo') b.prestamos++;
    else if(o.tipo==='alquiler'){ b.alquileres++; b.ingresos+=(+o.precio||0); }
    else if(o.tipo==='reparacion'){ b.reparaciones++; b.costoRep+=(+o.costo||0); }
  });
  return byY;
}

  /* ---- Herramientas ---- */
  const years=Object.keys(hy).filter(y=>y!=='—').sort().reverse();

function openOpForm(herrId, tipo, opId){
  const def=OP_DEFS[tipo]; if(!def) return;
  const o = opId!=null ? herrOps(herrId).find(x=>String(x.id)===String(opId)) : {};

    return {half:f.half, html:'<div class="field"><label>'+esc(f.l)+'</label><input id="op_'+f.k+'" type="'+f.t+'" value="'+esc(v)+'"></div>'};
  });
  let body='',i=0;
  while(i<fields.length){
    if(fields[i].half && fields[i+1] && fields[i+1].half){ body+='<div class="frow c2">'+fields[i].html+fields[i+1].html+'</div>'; i+=2; }
    else{ body+=fields[i].html; i++; }
  }
  openModal((opId!=null?'Editar ':'Registrar ')+def.label.toLowerCase(), body,
    '<button class="btn ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn" onclick="saveOp('+herrId+',\''+tipo+'\','+(opId!=null?opId:'null')+')">Guardar</button>');
}

async function saveOp(herrId, tipo, opId){
  const def=OP_DEFS[tipo];
  const obj={ herr_id:herrId, tipo };
  def.fields.forEach(f=>{ const el=document.getElementById('op_'+f.k); if(!el) return; let v=el.value; if(f.t==='number') v=v===''?null:+v; obj[f.k]=v; });
  if(DEMO_MODE){
    const arr=mem.herr_ops;
    if(opId==null||opId==='null'){ obj.id=Math.max(0,...arr.map(r=>+r.id||0))+1; arr.push(obj); }
    else { const r=arr.find(x=>String(x.id)===String(opId)); if(r) Object.assign(r,obj); }
  }else{
    if(opId==null||opId==='null') await sbFetch('/herr_operaciones',{method:'POST',body:JSON.stringify(obj)});
    else await sbFetch('/herr_operaciones?id=eq.'+opId,{method:'PATCH',body:JSON.stringify(obj)});
  }
  HERR_EXPANDED.add(herrId);
  closeModal(); toast('Guardado'); renderHerr();
}

function parseNum(s){ s=String(s==null?'':s).trim(); if(s==='') return null; s=s.replace(/[^\d.,-]/g,''); if(s==='') return null; if(s.indexOf(',')>=0) s=s.replace(/\./g,'').replace(',','.'); const n=parseFloat(s); return isNaN(n)?null:n; }

function ogTotal(og){ return (og.items&&og.items.length) ? og.items.reduce((a,it)=>a+itemTotal(it),0) : (+og.monto_total||0); }
function certMonto(c, og){
  if(og.items&&og.items.length){ const av=c.avances||{}; return og.items.reduce((a,it,idx)=>a+itemTotal(it)*((+av[idx]||0)/100),0); }

function ogMaxPagable(og){
  const cert=ogLiberado(og);                 // certificado y liberado (monto)
  if(og.condicion!=='CON ANTICIPO') return cert;   // solo lo certificado
  const ant=ogAnticipoMonto(og); const antPct=(+og.anticipo_pct||0)/100;
  if(og.anticipo_metodo==='B') return Math.max(ant, cert);   // recupera el anticipo primero

}

// tipo de auxiliar: primero el declarado en la clasificacion; si no esta en el mapa, se deduce por patron del codigo
function auxTipoDe(cod, info){
  if(info && info.aux) return info.aux;
  const c=(cod||'').toString().toUpperCase().trim();
  if(/^ROD/.test(c)||/^AUT/.test(c)) return '08';
  if(/^X[A-Z]/.test(c)) return '07';
  if(/^PL/.test(c)||/^IF/.test(c)) return '03';
  return '';
}

function auxSelfValue(cod, tipo){
  try{ const cat=(typeof CONTA_DB!=='undefined'&&CONTA_DB.auxopc&&CONTA_DB.auxopc[tipo])||[];
    const c=(cod||'').toString().toUpperCase().trim();
    const f=cat.find(x=>String(x.cod).toUpperCase()===c); if(f) return f.cod; }catch(e){}
  return '';
}
function artCuenta(cod){ return (cod&&ART_CUENTA[cod])||''; }

function impCalc(it){
  const clas=it.centro_costos||'';
  const info=clasifInfo(clas);
  const tipo=auxTipoDe(clas, info);
  const ccForz = info&&info.cuenta ? info.cuenta : '';      // D1: cuenta forzada por clasificacion
  const ccArt  = artCuenta(it.cod_art);                     // regla 2: cuenta del articulo
  const cc     = ccForz || ccArt;                           // D1: la forzada gana
  const aux={aux03:'',aux04:'',aux05:'',aux06:'',aux07:'',aux08:''};
  if(tipo==='03'){ aux.aux03 = auxSelfValue(clas,'3') || (/^(PL|IF)/i.test(clas)?clas.toUpperCase().trim():''); }
  else if(tipo==='04'){ aux.aux04 = (it.modulos||[]).join(' | '); }   // valor viene de la columna Modulo (D3)
  else if(tipo==='05'){ aux.aux05 = auxSelfValue(clas,'5'); }
  else if(tipo==='06'){ aux.aux06 = auxSelfValue(clas,'6'); }
  else if(tipo==='07'){ aux.aux07 = auxSelfValue(clas,'7'); }
  else if(tipo==='08'){ aux.aux08 = auxSelfValue(clas,'8'); }
  return {
    fam: tipo?('AUX'+tipo):(info?'CLAS':'OTRO'),
    cuenta_cod: cc, cuenta: cuentaDescByCod(cc),
    cuentaEditable: !!ccForz || !ccArt,     // marcar si forzada por clasif o si el articulo no trae cuenta
    eerr: info?info.eerr:'',
    aux03:aux.aux03, aux04:aux.aux04, aux05:aux.aux05, aux06:aux.aux06, aux07:aux.aux07, aux08:aux.aux08

      +'<td>'+(o.clasif_og?esc(o.clasif_og):'—')+'</td>'

      +'<td><strong>'+esc(o.numero||'—')+'</strong></td>'
      +'<td style="text-align:right">'+(tARS!=null?'$ '+fmt2(tARS):'—')+'</td>'
      +'<td style="text-align:right">'+(tUSD!=null?'US$ '+fmt2(tUSD):'—')+'</td>'
      +'<td style="text-align:right">'+pf(p(noCert))+'</td>'
      +'<td style="text-align:right">'+pf(p(certNoLib))+'</td>'
      +'<td style="text-align:right">'+pf(p(libNoPag))+'</td>'
      +'<td style="text-align:right">'+pf(p(pag))+'</td></tr>';
  }).join('') || '<tr><td colspan="9" style="color:var(--muted);padding:14px">Ninguna OG coincide con los filtros.</td></tr>';
  const foot='<tr style="border-top:2px solid var(--line-strong);font-weight:700"><td colspan="3" style="text-align:right">Total mostrado</td>'
    +'<td style="text-align:right">'+(totARS?'$ '+fmt2(totARS):'—')+'</td><td style="text-align:right">'+(totUSD?'US$ '+fmt2(totUSD):'—')+'</td><td colspan="4"></td></tr>';
  const th=(label,col)=>'<th style="white-space:nowrap">'+label+(col?' <button class="resfbtn" onclick="openResFilter(\''+col+'\',event)" title="Filtrar" style="border:none;background:none;cursor:pointer;padding:0 2px;font-size:11px;color:'+(resFilterActive(col)?'var(--olive-deep)':'var(--muted)')+'">▾</button>':'')+'</th>';
  const hay=['clasif','prov','og'].some(resFilterActive);
  const limpiar=hay?'<button class="btn ghost sm" style="margin-left:auto" onclick="resFilterClearAll()">Limpiar filtros</button>':'';
  return '<div class="card"><div class="card-h"><h3>Resumen por OG</h3><span class="meta">Filtrá por Clasificación (por renglón), Proveedor u OG. Totales con el TC de cada OG.</span>'+limpiar+'</div>'
    +'<table class="grid" style="font-size:12px"><thead><tr>'
    +th('Clasificación','clasif')+th('Proveedor','prov')+th('OG','og')
    +'<th style="text-align:right">Total ARS</th><th style="text-align:right">Total USD</th>'
    +'<th style="text-align:right">% pend. cert.</th><th style="text-align:right">% cert. no lib.</th><th style="text-align:right">% lib. no pag.</th><th style="text-align:right">% pagado</th>'
    +'</tr></thead><tbody>'+rows+foot+'</tbody></table></div>';
}

/* ===== Filtro tipo Excel para la lista de Órdenes de gasto ===== */
let OGX={};  // { field: [valores permitidos] }
function ogxName(n){ n=(n||'').trim(); if(!n) return '—'; const p=n.split(','); if(p.length>=2){ const ape=p[0].trim(); const nom=p[1].trim(); return ape+(nom?', '+nom.charAt(0).toUpperCase():''); } return n; }
function ogxVal(o,f){
  if(f==='og') return o.numero?String(o.numero):'(sin N°)';
  if(f==='estado') return ogEstado(o);
  if(f==='proveedor') return o.proveedor_cod||'(sin proveedor)';
  if(f==='solp') return (o.solp!=null&&o.solp!=='')?String(o.solp):'(sin SOLP)';
  if(f==='comprador') return o.comprador||'(sin comprador)';
  if(f==='certificador') return o.certificador||'(sin certificador)';
  return '';
}
function ogxUnique(f){ const s=new Set(); (mem.ogs||[]).forEach(o=>{ if(f==='clasif'){ (o.items||[]).forEach(it=>{ if(it.centro_costos) s.add(it.centro_costos); }); } else { const v=ogxVal(o,f); if(v) s.add(v); } }); return [...s].sort((a,b)=>String(a).localeCompare(String(b),'es',{numeric:true})); }
function ogxActive(f){ return !!(OGX[f]&&OGX[f].length); }
function ogxPass(o){ return Object.keys(OGX).every(f=>{ const a=OGX[f]; if(!a||!a.length) return true; if(f==='clasif') return (o.items||[]).some(it=>a.includes(it.centro_costos)); return a.includes(ogxVal(o,f)); }); }
function ogxClose(){ const p=document.getElementById('ogxPop'); if(p)p.remove(); document.removeEventListener('mousedown',ogxOutside,true); }
function ogxOutside(e){ const p=document.getElementById('ogxPop'); if(p&&!p.contains(e.target)&&!(e.target.closest&&e.target.closest('.ogxbtn'))) ogxClose(); }
function ogxOpen(f,ev){ ev.stopPropagation(); const btn=ev.currentTarget; ogxClose();
  const vals=ogxUnique(f); const sel=OGX[f]?new Set(OGX[f]):new Set(vals);
  const item=v=>'<label class="ogxitem" data-v="'+esc(v)+'" style="display:flex;align-items:center;gap:6px;padding:3px 4px;cursor:pointer"><input type="checkbox" class="ogxchk" value="'+esc(v)+'" '+(sel.has(v)?'checked':'')+'>'+esc(v)+'</label>';
  const pop=document.createElement('div'); pop.id='ogxPop';
  pop.style.cssText='position:absolute;z-index:9999;background:#fff;border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:8px;min-width:210px;max-width:320px;font-size:12.5px';
  pop.innerHTML='<input type="text" placeholder="Buscar" oninput="ogxSearch(this.value)" style="width:100%;box-sizing:border-box;border:1px solid var(--line-strong);border-radius:7px;padding:6px 8px;margin-bottom:6px;font-size:12.5px">'
    +'<label style="display:flex;align-items:center;gap:6px;padding:3px 4px;font-weight:700;border-bottom:1px solid var(--line);margin-bottom:4px;cursor:pointer"><input type="checkbox" '+(sel.size===vals.length?'checked':'')+' onchange="ogxToggleAll(this.checked)">(Seleccionar todo)</label>'
    +'<div id="ogxList" style="max-height:230px;overflow:auto">'+vals.map(item).join('')+'</div>'
    +'<div style="display:flex;gap:6px;margin-top:8px"><button class="btn sm" style="flex:1" onclick="ogxApply(\''+f+'\')">Aplicar</button><button class="btn ghost sm" style="flex:1" onclick="ogxClear(\''+f+'\')">Limpiar</button></div>';
  document.body.appendChild(pop);
  const r=btn.getBoundingClientRect(); const vw=document.documentElement.clientWidth;
  pop.style.top=(window.scrollY+r.bottom+4)+'px'; pop.style.left=(window.scrollX+Math.max(8,Math.min(r.left,vw-330)))+'px';
  setTimeout(()=>document.addEventListener('mousedown',ogxOutside,true),0);
}
function ogxSearch(q){ q=(q||'').toLowerCase(); document.querySelectorAll('#ogxList .ogxitem').forEach(el=>{ el.style.display=el.getAttribute('data-v').toLowerCase().includes(q)?'flex':'none'; }); }
function ogxToggleAll(ck){ document.querySelectorAll('#ogxList .ogxitem').forEach(el=>{ if(el.style.display!=='none'){ const c=el.querySelector('.ogxchk'); if(c)c.checked=ck; } }); }
function ogxApply(f){ const all=[...document.querySelectorAll('#ogxList .ogxchk')]; const chk=all.filter(c=>c.checked).map(c=>c.value); if(chk.length===all.length){ delete OGX[f]; } else { OGX[f]=chk; } ogxClose(); renderCompras(); }
function ogxClear(f){ delete OGX[f]; ogxClose(); renderCompras(); }
function ogxClearAll(){ OGX={}; renderCompras(); }
window.ogxOpen=ogxOpen; window.ogxSearch=ogxSearch; window.ogxToggleAll=ogxToggleAll; window.ogxApply=ogxApply; window.ogxClear=ogxClear; window.ogxClearAll=ogxClearAll;

/* ================================================================
   EXPORTAR — mismo formato que el informe de seguimiento de Tango,
   pero "Facturado" → "Pagado" (para no manejar dos informes distintos).
   Una fila por renglón. Columnas Tango que no aplican quedan vacías.
   ================================================================ */
const REPORT_COLS=['Talonario oc','Fecha de emisión','Cód. clasificación (Renglón)','Descripción Clasificación (Renglón)',
  'Nro. Orden de Compra','Cód. proveedor','Cód. Artículo','Descripción','Descripción artículo (Renglón)',
  'Desc. adicional artículo (Renglón)','Cantidad pedida','Cantidad Pendiente de recibir','Cantidad Pendiente de Facturar',
  'Cantidad Recibida','Cantidad Facturada','Total','Estado (renglón)','Observaciones','Moneda','Cotización',
  'Nombre del comprador','Condición de compra','SOLP_N° (Adic.)','CERTIFICADOR (Adic.)','COSTEO (Adic.)','ESTRUCTURA (Adic.)',
  'COMPRA_URGENTE (Adic.)','POSTVENTA (Adic.)','DESVIO_ (Adic.)','Desvio (Adic.)','RUBRO (Adic.)','SUBRUBRO (Adic.)','ALCANCE (Adic.)',
  'MODULO 1 (Adic.)','MODULO 2 (Adic.)','MODULO 3 (Adic.)','MODULO 4 (Adic.)','MODULO 5 (Adic.)',
  'Equiv. en pesos (compra)','Pesos pagados'];

function renglonPagadoPct(o, idx){
  // El pago es a nivel OG (por %), aplica igual a todos los renglones. Fuente real: Tesorería.
  return ogPagadoPct(o);
}
// Pesos realmente pagados de una OG (suma de cada pago llevado a pesos por su propio TC)
function ogPesosPagados(o){
  return pagosOf(o.id).reduce((a,p)=>{ const imp=+p.importe_pago||0; return a+(p.moneda_pago==='USD'?imp*(+p.tc||0):imp); },0);
}

function ogReportRows(ogs){
  const rows=[REPORT_COLS.slice()];
  ogs.forEach(o=>{
    const esUSD = (o.moneda==='Extranjera');
    const tcCompra = (o.tc_pesos!=null && o.tc_pesos!=='') ? +o.tc_pesos : (USD_VENTA?+USD_VENTA:null); // OG viejas: cotización actual
    const ppOG = ogPesosPagados(o);   // pesos realmente pagados (todos los pagos)
    const ogTot = ogTotal(o) || 0;    // total en moneda de la OG
    const round2 = x => Math.round((+x||0)*100)/100;
    const items=(o.items&&o.items.length)?o.items:[null]; // null = OG sin renglones
    items.forEach((it,idx)=>{
      const esOG = it===null;
      const cant = esOG ? '' : (+it.cant||0);
      const total = esOG ? ogTotal(o) : itemTotal(it);
      const pagPct = renglonPagadoPct(o, esOG?0:idx);
      const avancePct = esOG ? ogAcumPct(o.id) : itemAcumPct(o, idx);
      const cantPagada = esOG ? '' : +(cant*pagPct/100).toFixed(2);
      const cantPendPago = esOG ? '' : +(cant-cantPagada).toFixed(2);
      const cantCert = esOG ? '' : +(cant*avancePct/100).toFixed(2);
      const cantPendCert = esOG ? '' : +(cant-cantCert).toFixed(2);
      const r=new Array(REPORT_COLS.length).fill('');
      r[0]='40';                                       // Talonario oc
      r[1]= o.fecha ? fmtDate(o.fecha) : '';           // Fecha de emisión
      r[2]= esOG ? '' : (it.centro_costos||'');        // Cód. clasificación (Renglón)
      r[3]= esOG ? '' : clasifDesc(it.centro_costos);  // Descripción Clasificación (Renglón)
      r[4]= o.numero||'';                              // Nro. Orden de Compra
      r[5]= o.proveedor_cod||'';                       // Cód. proveedor
      r[6]= esOG ? '' : (it.cod_art||'');              // Cód. Artículo
      r[7]= esOG ? '' : artDesc(it.cod_art);           // Descripción (del diccionario)
      r[8]= esOG ? (o.objeto||'') : (it.articulo||''); // Descripción artículo (Renglón)
      r[9]= '';                                        // Desc. adicional artículo
      r[10]= cant;                                     // Cantidad pedida
      r[11]= cantPendCert;                             // Cant. Pendiente de recibir (= pend. certificar)
      r[12]= cantPendPago;                             // Cant. Pendiente de Facturar (= pend. pagar)
      r[13]= cantCert;                                 // Cantidad Recibida (= certificada)
      r[14]= cantPagada;                               // Cantidad Facturada (= pagada)
      r[15]= total;                                    // Total
      r[16]= (avancePct?avancePct.toFixed(1).replace('.0','')+'%':'0%'); // Estado (renglón)
      r[17]= o.observaciones||'';                      // Observaciones
      r[18]= o.moneda||'';                             // Moneda
      r[19]= USD_VENTA||'';                            // Cotización (dólar blue venta)
      r[20]= o.comprador||'';                          // Nombre del comprador
      r[21]= o.condicion||o.tipo_contratacion||'';     // Condición de compra
      r[22]= o.solp!=null?o.solp:'';                   // SOLP N°
      r[23]= o.certificador||'';                       // CERTIFICADOR
      r[24]= o.costeo||'';                             // COSTEO
      r[25]= o.estructura||'';                         // ESTRUCTURA
      r[26]= o.compra_urgente||'';                     // COMPRA_URGENTE
      r[27]= o.postventa||'';                          // POSTVENTA
      r[28]= o.desvio||'';                             // DESVIO_
      r[29]= o.desvio_txt||'';                         // Desvio (texto)
      r[30]= '';                                       // RUBRO (no se usa)
      r[31]= '';                                       // SUBRUBRO (no se usa)
      r[32]= o.alcance||'';                            // ALCANCE
      const mods = esOG ? [] : (it.modulos||[]);
      r[33]= mods[0]||''; r[34]= mods[1]||''; r[35]= mods[2]||''; r[36]= mods[3]||''; r[37]= mods[4]||'';  // MODULO 1-5
      // Equivalente en pesos de compra: USD → total×TC ; pesos → total tal cual
      r[38]= esUSD ? (tcCompra!=null?round2(total*tcCompra):'') : round2(total);
      // Pesos pagados (foto del momento): reparto proporcional del total pagado en pesos según el peso de la fila
      r[39]= round2( ogTot ? ppOG*(total/ogTot) : (esOG?ppOG:0) );

}

/* ============ ASIENTO CONTABLE (formato hoja CAJA) ============
   Contrapartida: 11110071 CAJA PESOS 2. Empresa: 4Commerce. TIPO: EGRESO.
   Una línea de gasto por renglón (cuenta + auxiliares) + una línea de
   contrapartida por OG. Catálogos: CONFIGURACION_TANGO (autoritativo).
   ============================================================== */
const ASIENTO_COLS=['FECHA','TIPO','ID CUENTA','CUENTA CONTABLE','Aux Req','02 EERR','03 PROYECTO','04 CONT/MOD','05 MANT','06 MU','07 HERR','08 RODADOS','10 SUELDOS','11 IIBB','Cód. Prov.','Proveedor','Legajo','Empleado','SOLP','OG','CONCEPTO','INGRESO $','EGRESO $','MOVIMIENTO $','SALDO $','LEYENDA TANGO','✓ ENV.','N° ASIENTO TANGO','OBSERVACIONES'];
const CONTRAPARTIDA={cod:'11110071', nombre:'CAJA PESOS 2'};
function auxReqStr(im){ const r=['02']; if(im.aux03)r.push('03'); if(im.aux04)r.push('04'); if(im.aux07)r.push('07'); if(im.aux08)r.push('08'); return r.join(' / '); }
function asientoRows(ogs){
  const rows=[ASIENTO_COLS.slice()];
  ogs.forEach(o=>{
    const fecha=o.fecha?fmtDate(o.fecha):'';
    const items=(o.items&&o.items.length)?o.items:[null];
    items.forEach(it=>{
      const esOG=it===null;
      const im=esOG?{cuenta_cod:'',cuenta:'',eerr:'',aux03:'',aux04:'',aux07:'',aux08:''}:imputacion(it);
      const imp=esOG?ogTotal(o):itemTotal(it);
      const r=new Array(ASIENTO_COLS.length).fill('');
      r[0]=fecha; r[1]='EGRESO';
      r[2]=im.cuenta_cod||''; r[3]=im.cuenta||'';
      r[4]=esOG?'':auxReqStr(im);
      r[5]=eerrFmt(im.eerr);
      r[6]=im.aux03||''; r[7]=im.aux04||''; r[10]=im.aux07||''; r[11]=im.aux08||'';
      r[14]=o.proveedor_cod||''; r[15]=o.proveedor||'';
      r[18]=o.solp!=null?o.solp:''; r[19]=o.numero||'';
      r[20]=esOG?(o.objeto||''):((it.articulo||'')||o.objeto||'');
      r[21]=0; r[22]=imp; r[23]=-imp;                 // INGRESO / EGRESO / MOVIMIENTO
      r[25]=(o.proveedor_cod||'')+' - '+(im.cuenta||o.objeto||'');   // LEYENDA TANGO
      rows.push(r);
    });
    // contrapartida por OG (caja según la moneda en que se pagó; si no hay pago, CAJA PESOS 2)
    const tot=ogTotal(o);
    const pg=pagosOf(o.id)[0];
    const caja = pg ? CAJAS[pg.moneda_pago] : {cod:CONTRAPARTIDA.cod, nombre:CONTRAPARTIDA.nombre};
    const cr=new Array(ASIENTO_COLS.length).fill('');
    cr[0]=fecha; cr[1]='EGRESO'; cr[2]=caja.cod; cr[3]=caja.nombre;
    cr[14]=o.proveedor_cod||''; cr[15]=o.proveedor||''; cr[19]=o.numero||'';
    cr[20]='Contrapartida OG '+(o.numero||''); cr[21]=tot; cr[22]=0; cr[23]=tot;
    cr[25]=caja.nombre+' - OG '+(o.numero||'');
    rows.push(cr);
  });
  return rows;
}

function proyectadoView(){
  const fmt2=x=>(+x||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const mfmt=(mon,v)=>(mon==='USD'?'US$ ':'$ ')+fmt2(v);

  const tot={ARS:{sc:0,cl:0,lp:0}, USD:{sc:0,cl:0,lp:0}};

  ogs.forEach(o=>{
    const mon=ogMonedaCode(o);
    const total=ogTotal(o), cert=ogAcumMonto(o), lib=ogLiberado(o), pag=ogPagado(o);
    const sc=Math.max(0,total-cert), cl=Math.max(0,cert-lib), lp=Math.max(0,lib-pag);
    if(sc+cl+lp<=0.005) return;
    tot[mon].sc+=sc; tot[mon].cl+=cl; tot[mon].lp+=lp;

  if(!detail.length) return '<div class="card"><div class="empty">No hay OG con saldo pendiente de pago.</div></div>';
  const COL={sc:'#c9c49f', cl:'#5f7a4e', lp:'#37432c'};   // colores de las 3 situaciones
  // Torta SVG dibujada a mano (sin librería). Devuelve '' si no hay total.
  function donut(sc,cl,lp){
    const total=sc+cl+lp; if(total<=0) return '<div style="width:104px;height:104px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;text-align:center">sin saldo</div>';
    const C=2*Math.PI*46; const seg=v=>v/total*C;
    const L1=seg(sc), L2=seg(cl), L3=seg(lp);
    const arc=(len,off,color)=>'<circle cx="60" cy="60" r="46" fill="none" stroke="'+color+'" stroke-width="16" stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+off.toFixed(2)+'" transform="rotate(-90 60 60)"></circle>';
    return '<svg viewBox="0 0 120 120" width="104" height="104" role="img" aria-label="Desglose por situación">'
      +'<circle cx="60" cy="60" r="46" fill="none" stroke="#e6e3d5" stroke-width="16"></circle>'
      +(sc>0?arc(L1,0,COL.sc):'')+(cl>0?arc(L2,-L1,COL.cl):'')+(lp>0?arc(L3,-(L1+L2),COL.lp):'')
      +'</svg>';

  function card(titulo,mon,b){
    const total=b.sc+b.cl+b.lp; const simb=mon==='USD'?'US$ ':'$ ';
